<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聪明钱监控面板</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d;
    --text: #e6edf3; --text2: #8b949e; --green: #3fb950;
    --red: #f85149; --yellow: #d29922; --blue: #58a6ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', sans-serif; padding: 16px; }

  .header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .controls { display: flex; gap: 8px; align-items: center; }
  .controls input, .controls select {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 6px 12px; border-radius: 6px; font-size: 14px;
  }
  .controls button {
    background: var(--blue); color: #fff; border: none; padding: 6px 16px;
    border-radius: 6px; cursor: pointer; font-size: 14px;
  }
  .controls button:hover { opacity: 0.85; }
  .symbol-select-wrap { position: relative; }
  .symbol-select-wrap input { width: 120px; }
  .symbol-dropdown {
    position: absolute; top: 100%; left: 0; z-index: 1000;
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    max-height: 280px; overflow-y: auto; width: 220px; margin-top: 4px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4); display: none;
  }
  .symbol-dropdown.show { display: block; }
  .symbol-dropdown-item {
    padding: 7px 12px; font-size: 12px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    color: var(--text); transition: background 0.1s;
  }
  .symbol-dropdown-item:hover { background: rgba(88,166,255,0.12); }
  .symbol-dropdown-item .sym-name { font-weight: 500; }
  .symbol-dropdown-item .sym-vol { color: var(--text2); font-size: 10px; }
  .symbol-dropdown-item .sym-chg { font-size: 10px; }
  .symbol-dropdown-empty { padding: 12px; font-size: 12px; color: var(--text2); text-align: center; }
  .filter-bar {
    display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
    padding: 8px 12px; background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; flex-wrap: wrap;
  }
  .filter-tabs { display: flex; gap: 4px; }
  .filter-tab {
    background: var(--bg); border: 1px solid var(--border); color: var(--text2);
    padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500;
    transition: all 0.15s; position: relative;
  }
  .filter-tab:hover { border-color: var(--blue); color: var(--text); }
  .filter-tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .filter-tab .badge {
    position: absolute; top: -5px; right: -5px; background: var(--green); color: #fff;
    font-size: 9px; min-width: 14px; height: 14px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center; padding: 0 3px;
  }
  .filter-tab.loading::after {
    content: ''; display: inline-block; width: 10px; height: 10px; margin-left: 4px;
    border: 2px solid #fff3; border-top-color: #fff; border-radius: 50%;
    animation: spin 0.6s linear infinite; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .filter-sep { width: 1px; height: 16px; background: var(--border); margin: 0 4px; }
  .filter-group { display: flex; gap: 2px; align-items: center; }
  .filter-group-label { font-size: 10px; color: var(--text2); margin-right: 3px; white-space: nowrap; }
  .filter-pill {
    background: var(--bg); border: 1px solid var(--border); color: var(--text2);
    padding: 2px 7px; border-radius: 4px; cursor: pointer; font-size: 10px;
    transition: all 0.15s; white-space: nowrap;
  }
  .filter-pill:hover { border-color: var(--blue); color: var(--text); }
  .filter-pill.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .coin-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .coin-list-wrap {
    margin-bottom: 16px; position: relative;
  }
  .coin-list-wrap.collapsed .coin-tabs { max-height: 72px; overflow: hidden; }
  .coin-list-wrap .show-more-btn {
    display: none; margin-top: 6px; background: none; border: 1px solid var(--border);
    color: var(--text2); padding: 3px 12px; border-radius: 4px; cursor: pointer; font-size: 11px;
  }
  .coin-list-wrap .show-more-btn:hover { border-color: var(--blue); color: var(--text); }
  .coin-list-wrap.collapsed .show-more-btn { display: inline-block; }
  .coin-list-wrap.expanded .show-more-btn { display: inline-block; }

  .coin-tab { transition: all 0.12s; }
  .coin-tab:hover { border-color: var(--blue); color: var(--text); transform: translateY(-1px); }
  .coin-tab.active { box-shadow: 0 2px 8px rgba(88, 166, 255, 0.2); }

  @media (max-width: 768px) {
    body { padding: 10px; }
    .header { gap: 8px; margin-bottom: 8px; }
    .header h1 { font-size: 16px; }
    .filter-bar { padding: 6px 8px; gap: 6px; }
    .filter-group-label { display: none; }
    .filter-sep { height: 12px; }
    .filter-pill { padding: 2px 5px; font-size: 9px; }
    .filter-tab { padding: 4px 10px; font-size: 11px; }
    .coin-tab { padding: 3px 8px; font-size: 11px; }
    .coin-tabs { gap: 3px; }
    .controls input { width: 80px !important; }
    .overview { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .charts-grid { grid-template-columns: 1fr; }
    .kline-section { padding: 12px; }
    .signal-detail-card { padding: 12px; }
    .signal-detail-card .sd-signals { grid-template-columns: 1fr; }
  }
  @media (max-width: 480px) {
    .filter-bar { flex-direction: column; align-items: flex-start; }
    .filter-sep { width: 100%; height: 1px; margin: 4px 0; }
    .overview { grid-template-columns: repeat(2, 1fr); }
    .controls { flex-wrap: wrap; }
  }
  .coin-tab {
    background: var(--card); border: 1px solid var(--border); color: var(--text2);
    padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500;
    transition: all 0.15s;
  }
  .coin-tab:hover { border-color: var(--blue); color: var(--text); }
  .coin-tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .coin-tab .remove-btn {
    display: none; margin-left: 4px; font-size: 10px; cursor: pointer;
    color: var(--red); font-weight: 700;
  }
  .coin-tabs.editing .coin-tab .remove-btn { display: inline; }
  .coin-tabs.editing .coin-tab { padding-right: 6px; }
  .edit-toggle {
    background: none; border: 1px solid var(--border); color: var(--text2);
    padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 11px;
  }
  .edit-toggle:hover { border-color: var(--blue); color: var(--text); }
  .add-coin-wrap { position: relative; display: none; }
  .coin-tabs.editing ~ .add-coin-wrap { display: inline-flex; align-items: center; }
  .coin-search-input {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 4px 8px; border-radius: 6px; font-size: 12px; width: 120px;
  }
  .coin-search-input:focus { border-color: var(--blue); outline: none; }
  .coin-dropdown {
    position: absolute; top: 100%; left: 0; z-index: 999;
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    max-height: 240px; overflow-y: auto; width: 180px; margin-top: 4px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4); display: none;
  }
  .coin-dropdown.show { display: block; }
  .coin-dropdown-item {
    padding: 6px 10px; font-size: 12px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    color: var(--text);
  }
  .coin-dropdown-item:hover { background: rgba(88,166,255,0.1); }
  .coin-dropdown-item .vol { color: var(--text2); font-size: 10px; }
  .coin-dropdown-empty { padding: 10px; font-size: 12px; color: var(--text2); text-align: center; }
  .status { font-size: 13px; color: var(--text2); }
  .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
  .status .live { background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .overview { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; text-align: center;
  }
  .stat-card .label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .stat-card .value { font-size: 24px; font-weight: 700; }
  .stat-card .sub { font-size: 12px; color: var(--text2); margin-top: 4px; }

  .signals {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; margin-bottom: 20px;
  }
  .signals h3 { font-size: 15px; margin-bottom: 10px; color: var(--blue); }
  .signal-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 14px; }
  .signal-icon { font-size: 16px; width: 20px; text-align: center; }

  .entry-rec {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; margin-bottom: 20px; display: none;
  }
  .entry-rec.show { display: block; }
  .entry-rec h3 { font-size: 15px; margin-bottom: 12px; color: var(--yellow); }
  .entry-rec-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px;
    margin-bottom: 12px;
  }
  .entry-rec-card {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; text-align: center;
  }
  .entry-rec-card .label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .entry-rec-card .value { font-size: 16px; font-weight: 600; }
  .entry-rec-card .value.buy { color: var(--green); }
  .entry-rec-card .value.stop { color: var(--red); }
  .entry-rec-card .value.target { color: var(--blue); }
  .entry-rec-reasons { font-size: 12px; color: var(--text2); line-height: 1.6; }
  .entry-rec-reasons li { margin-bottom: 2px; }

  .kline-section {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; margin-bottom: 20px;
  }
  .kline-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .kline-header h3 { font-size: 15px; color: var(--blue); }
  .tf-tabs { display: flex; gap: 4px; }
  .tf-tab {
    background: var(--bg); border: 1px solid var(--border); color: var(--text2);
    padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
  }
  .tf-tab:hover { border-color: var(--blue); color: var(--text); }
  .tf-tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .kline-canvas-wrap { position: relative; }
  .kline-canvas-wrap canvas { width: 100% !important; }
  #c-kline { height: 320px !important; }
  #c-kline-overlay { height: 320px !important; position: absolute; top: 0; left: 0; pointer-events: none; }
  #c-rsi { height: 120px !important; }
  .kline-hover-area { position: relative; cursor: crosshair; }
  .kline-ohlc { font-size: 12px; color: var(--text2); min-height: 18px; margin-bottom: 2px; line-height: 1.6; }
  .kline-ohlc span { margin-right: 10px; white-space: nowrap; }
  .rsi-label { font-size: 12px; color: var(--text2); margin-top: 4px; }

  .chart-range-bar {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    padding: 6px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  }
  .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 16px; }
  .chart-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; overflow: hidden;
  }
  .chart-card h3 { font-size: 14px; margin-bottom: 12px; color: var(--text2); }
  .chart-card canvas { width: 100% !important; height: 220px !important; cursor: crosshair; }
  .chart-card canvas.chart-tall { height: 270px !important; }
  .chart-card { position: relative; }
  .chart-tooltip {
    position: fixed; z-index: 9999; pointer-events: none;
    background: rgba(22,27,34,0.95); border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; font-size: 11px; color: var(--text); line-height: 1.5;
    white-space: nowrap; display: none; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .chart-tooltip.show { display: block; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 6px 8px; color: var(--text2); font-weight: 500; border-bottom: 1px solid var(--border); }
  td { padding: 5px 8px; border-bottom: 1px solid var(--border); }
  .up { color: var(--green); } .down { color: var(--red); } .neutral { color: var(--yellow); }

  .signal-detail-card {
    background: var(--card); border: 1px solid var(--blue); border-radius: 10px;
    padding: 16px; margin-bottom: 16px; display: none;
    animation: fadeSlideDown 0.25s ease;
  }
  .signal-detail-card.show { display: block; }
  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .signal-detail-card .sd-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
  }
  .signal-detail-card .sd-header h3 { font-size: 16px; color: var(--blue); }
  .signal-detail-card .sd-close {
    background: none; border: none; color: var(--text2); font-size: 18px; cursor: pointer;
    padding: 2px 8px; border-radius: 4px;
  }
  .signal-detail-card .sd-close:hover { color: var(--text); background: var(--bg); }
  .signal-detail-card .sd-score {
    display: flex; align-items: center; gap: 6px; margin-bottom: 12px;
  }
  .signal-detail-card .sd-score-bar {
    flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden;
  }
  .signal-detail-card .sd-score-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .signal-detail-card .sd-signals { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; }
  .signal-detail-card .sd-signal-item {
    display: flex; align-items: center; gap: 6px; font-size: 13px; padding: 4px 0;
  }
  .signal-detail-card .sd-meta {
    display: flex; gap: 16px; margin-top: 12px; padding-top: 10px;
    border-top: 1px solid var(--border); font-size: 12px; color: var(--text2);
  }

  .strategy-section {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; margin-bottom: 20px;
  }
  .strategy-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .strategy-header h3 { font-size: 15px; color: var(--yellow); margin: 0; }
  .strategy-toggle { font-size: 12px; color: var(--text2); }
  .strategy-tabs { display: flex; gap: 6px; margin: 12px 0; }
  .strat-group { margin-bottom: 12px; }
  .strat-group-title { font-size: 12px; font-weight: 600; color: var(--yellow); margin-bottom: 6px; padding-left: 4px; border-left: 3px solid var(--yellow); }
  .strat-condition {
    display: grid; grid-template-columns: 180px 1fr 80px; gap: 8px; align-items: center;
    padding: 8px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px;
    font-size: 12px;
  }
  .strat-condition .cond-name { font-weight: 500; }
  .strat-condition input, .strat-condition select {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 3px 6px; border-radius: 4px; font-size: 12px;
  }
  .strat-condition .cond-weight { width: 40px; text-align: center; }
  .strat-actions { display: flex; gap: 8px; margin-top: 12px; }
  .strat-actions button {
    padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; border: none;
  }
  .strat-btn-save { background: var(--green); color: #fff; }
  .strat-btn-reset { background: var(--border); color: var(--text); }
  .strat-btn-backtest { background: var(--blue); color: #fff; }
  .backtest-result {
    margin-top: 12px; padding: 12px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px; font-size: 12px;
  }
  .backtest-result .stat { display: inline-block; margin-right: 16px; }
  .backtest-result .stat .val { font-weight: 600; font-size: 14px; }

  .sim-section {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; margin-bottom: 20px;
  }
  .sim-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .sim-header h3 { font-size: 15px; color: var(--green); margin: 0; }
  .sim-toggle { font-size: 12px; color: var(--text2); }
  .sim-tabs { display: flex; gap: 6px; margin: 12px 0; }
  .sim-status-bar {
    display: flex; align-items: center; gap: 16px; padding: 10px 14px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px;
  }
  .sim-status-bar .sim-stat { font-size: 12px; }
  .sim-status-bar .sim-stat .val { font-weight: 600; font-size: 14px; }
  .sim-running-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
  }
  .sim-running-badge.active { background: rgba(63,185,80,0.15); color: var(--green); }
  .sim-running-badge.stopped { background: rgba(139,148,158,0.15); color: var(--text2); }
  .sim-running-badge .dot { width: 6px; height: 6px; border-radius: 50%; }
  .sim-running-badge.active .dot { background: var(--green); animation: pulse 1.5s infinite; }
  .sim-running-badge.stopped .dot { background: var(--text2); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .sim-config {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px; margin-bottom: 12px;
  }
  .sim-config label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 3px; }
  .sim-config input, .sim-config select {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 5px 8px; border-radius: 6px; font-size: 12px;
  }
  .sim-btn-start { background: var(--green); color: #fff; border: none; padding: 8px 20px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .sim-btn-stop { background: var(--red); color: #fff; border: none; padding: 8px 20px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .sim-btn-reset { background: var(--border); color: var(--text); border: none; padding: 8px 16px; border-radius: 6px; font-size: 12px; cursor: pointer; }
  .sim-positions { margin-top: 12px; }
  .sim-pos-card {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 8px; font-size: 12px;
  }
  .sim-pos-card .pos-dir { font-weight: 700; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
  .sim-pos-card .pos-dir.long { background: rgba(63,185,80,0.15); color: var(--green); }
  .sim-pos-card .pos-dir.short { background: rgba(248,81,73,0.15); color: var(--red); }
  .sim-log {
    max-height: 300px; overflow-y: auto; margin-top: 12px;
    border: 1px solid var(--border); border-radius: 8px; background: var(--bg);
  }
  .sim-log-item {
    padding: 6px 12px; border-bottom: 1px solid var(--border); font-size: 11px; display: flex; gap: 8px;
  }
  .sim-log-item:last-child { border-bottom: none; }
  .sim-log-item .log-time { color: var(--text2); min-width: 60px; }
  .sim-log-item .log-action { font-weight: 600; min-width: 50px; }
  .sim-log-item.log-open .log-action { color: var(--blue); }
  .sim-log-item.log-close .log-action { color: var(--yellow); }
  .sim-log-item.log-tp .log-action { color: var(--green); }
  .sim-log-item.log-sl .log-action { color: var(--red); }
  .sim-equity-canvas { width: 100% !important; height: 150px !important; cursor: crosshair; margin-top: 12px; }

  .alert-section {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; margin-bottom: 20px;
  }
  .alert-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .alert-header h3 { font-size: 15px; color: var(--blue); }
  .alert-form { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
  .alert-form select, .alert-form input {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 5px 10px; border-radius: 6px; font-size: 13px;
  }
  .alert-form input { width: 100px; }
  .alert-form button {
    background: var(--green); color: #fff; border: none; padding: 5px 14px;
    border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  .alert-list { max-height: 200px; overflow-y: auto; }
  .alert-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 8px; border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .alert-item:last-child { border-bottom: none; }
  .alert-item .desc { flex: 1; }
  .alert-item .triggered { color: var(--green); font-weight: 600; margin-right: 8px; }
  .alert-item .del-btn {
    background: none; border: none; color: var(--red); cursor: pointer;
    font-size: 14px; padding: 2px 6px;

let symbol = urlParams.get('symbol')?.toUpperCase() || 'SLXUSDT';
let interval = parseInt(urlParams.get('interval') || '60', 10);
let timer = null;
let remaining = 0;

const defaultCoins = [
  { symbol: 'VELVETUSDT', label: 'VELVET' },
  { symbol: 'SLXUSDT', label: 'SLX' },
  { symbol: 'SKYAIUSDT', label: 'SKYAI' },

  { symbol: 'ESPORTSUSDT', label: 'ESPORTS' },
  { symbol: 'PLAYUSDT', label: 'PLAY' },
  { symbol: 'BEATUSDT', label: 'BEAT' },
  { symbol: 'BTCUSDT', label: 'BTC' },
];

function loadCoins() {

  } catch {}
  return [...defaultCoins];
}
function saveCoins() { localStorage.setItem('smart-money-coins', JSON.stringify(presetCoins)); }
let presetCoins = loadCoins();
let editing = false;

function escAttr(s) { return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

// Right-side trading filter
function loadFilterSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('smart-money-filter-settings'));
    return s || {};
  } catch { return {}; }
}
function saveFilterSettings() {
  localStorage.setItem('smart-money-filter-settings', JSON.stringify({ filterTF, scanTopLimit, activeFilter, sortBy }));
}
const savedFilterSettings = loadFilterSettings();
let activeFilter = savedFilterSettings.activeFilter || 'all';
let rightSideCoins = new Set();
let rightSideLoading = false;
let rightSideCache = {};
let filterTF = savedFilterSettings.filterTF || '1h';
const FILTER_TF_OPTIONS = [
  { value: '1h', label: '1H' },
  { value: '4h', label: '4H' },
  { value: '1d', label: '1D' },
];
const SCAN_RANGE_OPTIONS = [
  { value: 50, label: 'Top50' },
  { value: 100, label: 'Top100' },
  { value: 200, label: 'Top200' },
  { value: 500, label: 'Top500' },
];
const SORT_OPTIONS = [
  { value: 'score', label: '评分↓' },
  { value: 'change', label: '涨幅↓' },
  { value: 'volume', label: '成交量↓' },
];
let sortBy = savedFilterSettings.sortBy || 'score';

const CHART_RANGE_OPTIONS = [
  { value: '12h', label: '12H', limits: { ratio: 12, oi: 6, taker: 144 } },
  { value: '1d', label: '1D', limits: { ratio: 24, oi: 6, taker: 288 } },
  { value: '3d', label: '3D', limits: { ratio: 72, oi: 18, taker: 288 } },
  { value: '7d', label: '7D', limits: { ratio: 168, oi: 42, taker: 288 } },
];
let chartRange = localStorage.getItem('chartRange') || '3d';

const timeframes = [
  { value: '5m', label: '5分钟' },
  { value: '1h', label: '1小时' },
  { value: '4h', label: '4小时' },
  { value: '1d', label: '1天' },
];
let currentTF = '1h';
let lastKlines = null;

// Alert system
function loadAlerts() {
  try { return JSON.parse(localStorage.getItem('smart-money-alerts') || '[]'); } catch { return []; }
}
function saveAlerts() { localStorage.setItem('smart-money-alerts', JSON.stringify(alerts)); }
let alerts = loadAlerts();
let alertIdCounter = alerts.reduce((max, a) => Math.max(max, a.id || 0), 0) + 1;

const ALERT_LABELS = {
  price_above: '价格 >',  price_below: '价格 <',
  rsi_above: 'RSI6 >',    rsi_below: 'RSI6 <',
  top_long: '大户翻多',   top_short: '大户翻空',
  buy_surge: '买入激增',  sell_surge: '卖出激增',
};
const NO_VALUE_TYPES = ['top_long', 'top_short', 'buy_surge', 'sell_surge'];

function addAlert() {
  const type = document.getElementById('alertType').value;
  const value = parseFloat(document.getElementById('alertValue').value);
  if (!NO_VALUE_TYPES.includes(type) && isNaN(value)) return;
  alerts.push({
    id: alertIdCounter++, type, value: NO_VALUE_TYPES.includes(type) ? null : value,
    symbol, triggered: false, createdAt: Date.now(),
  });
  saveAlerts();
  document.getElementById('alertValue').value = '';
  renderAlerts();
}

function removeAlert(id) {
  alerts = alerts.filter(a => a.id !== id);
  saveAlerts();
  renderAlerts();
}

function renderAlerts() {
  const el = document.getElementById('alertList');
  if (!alerts.length) { el.innerHTML = '<div style="color:var(--text2);font-size:12px;padding:6px 0;">暂无报警</div>'; return; }
  el.innerHTML = alerts.map(a => {
    const label = ALERT_LABELS[a.type] || a.type;
    const valStr = a.value !== null ? ` ${a.value}` : '';
    return `<div class="alert-item">
      <span class="desc">[${a.symbol}] ${label}${valStr}</span>
      ${a.triggered ? '<span class="triggered">已触发</span>' : ''}
      <button class="del-btn" onclick="removeAlert(${a.id})">✕</button>
    </div>`;
  }).join('');
}

function playAlertSound() {
  if (!document.getElementById('alertSound').checked) return;
  try {
    const actx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.connect(gain); gain.connect(actx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.5);
    osc.start(); osc.stop(actx.currentTime + 0.5);
  } catch {}
}

async function sendToFeishu(title, body) {
  if (!document.getElementById('alertFeishu').checked) return;
  try {
    await fetch('/api/feishu-alert', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, content: body }),
    });
  } catch (e) { console.error('Feishu send error:', e); }
}

function showToast(title, body) {
  const toast = document.getElementById('alertToast');
  document.getElementById('toastTitle').textContent = title;
  document.getElementById('toastBody').textContent = body;
  toast.classList.add('show');
  playAlertSound();
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(title, { body, icon: '📊' });
  }
  sendToFeishu(title, body);
  setTimeout(() => toast.classList.remove('show'), 6000);
}

function checkAlerts(data) {
  const price = parseFloat(data.price.price);
  const topPos = data.topPositions[data.topPositions.length - 1];
  const posRatio = parseFloat(topPos.longShortRatio);
  const taker = data.takerVol[data.takerVol.length - 1];
  const bsRatio = parseFloat(taker.buySellRatio);

  alerts.forEach(a => {
    if (a.triggered || a.symbol !== symbol) return;
    let fire = false, msg = '';
    switch (a.type) {
      case 'price_above': fire = price > a.value; msg = `价格 ${price.toFixed(4)} 突破 ${a.value}`; break;
      case 'price_below': fire = price < a.value; msg = `价格 ${price.toFixed(4)} 跌破 ${a.value}`; break;
      case 'top_long': fire = posRatio > 1; msg = `大户持仓翻多 (比值 ${posRatio.toFixed(4)})`; break;
      case 'top_short': fire = posRatio < 1; msg = `大户持仓翻空 (比值 ${posRatio.toFixed(4)})`; break;
      case 'buy_surge': fire = bsRatio > 1.2; msg = `主动买入激增 (买卖比 ${bsRatio.toFixed(4)})`; break;
      case 'sell_surge': fire = bsRatio < 0.8; msg = `主动卖出激增 (买卖比 ${bsRatio.toFixed(4)})`; break;
    }
    if (fire) {
      a.triggered = true;
      saveAlerts();
      renderAlerts();
      showToast(`${a.symbol} 报警触发`, msg);
    }
  });
}

// RSI alerts check separately after kline fetch
function checkRSIAlerts(rsi6) {
  const lastRSI = rsi6.filter(v => v !== null).pop();
  if (!lastRSI) return;
  alerts.forEach(a => {
    if (a.triggered || a.symbol !== symbol) return;
    let fire = false, msg = '';
    if (a.type === 'rsi_above' && lastRSI > a.value) {
      fire = true; msg = `RSI6 = ${lastRSI.toFixed(1)} 超过 ${a.value}`;
    }
    if (a.type === 'rsi_below' && lastRSI < a.value) {
      fire = true; msg = `RSI6 = ${lastRSI.toFixed(1)} 低于 ${a.value}`;
    }
    if (fire) {
      a.triggered = true; saveAlerts(); renderAlerts();
      showToast(`${a.symbol} 报警触发`, msg);
    }
  });
}

function formatNum(n) {
  if (n >= 1e8) return (n / 1e8).toFixed(2) + '亿';
  if (n >= 1e4) return (n / 1e4).toFixed(2) + '万';
  return n.toFixed(0);
}
function formatUSDT(n) {
  if (n >= 1e8) return '$' + (n / 1e8).toFixed(2) + '亿';
  if (n >= 1e4) return '$' + (n / 1e4).toFixed(2) + '万';
  return '$' + n.toFixed(2);
}
function ts2time(ts) {
  const d = new Date(ts);
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const hh = String(d.getHours()).padStart(2, '0');
  const mi = String(d.getMinutes()).padStart(2, '0');
  return `${mm}-${dd} ${hh}:${mi}`;
}
function ratioClass(r) {
  r = parseFloat(r);
  if (r >= 1.0) return 'up';
  if (r >= 0.9) return 'neutral';
  return 'down';
}

function renderSignals(data) {
  const latestPos = data.topPositions[data.topPositions.length - 1];
  const latestGlobal = data.globalRatio[data.globalRatio.length - 1];
  const latestTaker = data.takerVol[data.takerVol.length - 1];
  const fr = parseFloat(data.fundingRate.lastFundingRate);
  const posR = parseFloat(latestPos.longShortRatio);
  const gR = parseFloat(latestGlobal.longShortRatio);
  const bsR = parseFloat(latestTaker.buySellRatio);

  let items = [];
  items.push(posR > 1 
    ? `<div class="signal-item"><span class="signal-icon up">✓</span>大户持仓偏多 (${posR.toFixed(4)})</div>`
    : `<div class="signal-item"><span class="signal-icon down">✗</span>大户持仓偏空 (${posR.toFixed(4)})</div>`);
  items.push(gR > 1
    ? `<div class="signal-item"><span class="signal-icon up">✓</span>全网偏多 (${gR.toFixed(4)})</div>`
    : `<div class="signal-item"><span class="signal-icon down">✗</span>全网偏空 (${gR.toFixed(4)})</div>`);
  if (posR > 1 && gR < 1) {
    items.push(`<div class="signal-item"><span class="signal-icon neutral">⚡</span><strong class="neutral">大户多 + 散户空 = 聪明钱抄底信号</strong></div>`);
  }
  if (bsR > 1.1) items.push(`<div class="signal-item"><span class="signal-icon up">✓</span>强力主动买入 (${bsR.toFixed(4)})</div>`);
  else if (bsR < 0.9) items.push(`<div class="signal-item"><span class="signal-icon down">✗</span>强力主动卖出 (${bsR.toFixed(4)})</div>`);
  else items.push(`<div class="signal-item"><span class="signal-icon neutral">─</span>买卖均衡 (${bsR.toFixed(4)})</div>`);

  if (fr > 0.001) items.push(`<div class="signal-item"><span class="signal-icon down">⚠</span>资金费率偏高 (${(fr*100).toFixed(4)}%) - 多头拥挤</div>`);
  else if (fr < -0.001) items.push(`<div class="signal-item"><span class="signal-icon up">✓</span>资金费率为负 (${(fr*100).toFixed(4)}%) - 空头付费</div>`);
  else items.push(`<div class="signal-item"><span class="signal-icon neutral">─</span>资金费率中性 (${(fr*100).toFixed(4)}%)</div>`);

  document.getElementById('signals').innerHTML = `<h3>信号摘要</h3>${items.join('')}`;
}

function drawLineChart(canvas, labels, datasets) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pad = { top: 10, right: 12, bottom: 28, left: 48 };
  const cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;

  let allVals = datasets.flatMap(d => d.data);
  let min = Math.min(...allVals), max = Math.max(...allVals);
  const range = max - min || 1;
  min -= range * 0.05; max += range * 0.05;

  ctx.clearRect(0, 0, W, H);

  // grid
  ctx.strokeStyle = '#21262d'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (ch / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.fillStyle = '#8b949e'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText((max - (max - min) * (i / 4)).toFixed(4), pad.left - 4, y + 3);
  }

  // reference line at 1.0 if in range
  if (min < 1 && max > 1) {
    const y1 = pad.top + ch * (1 - (1 - min) / (max - min));
    ctx.strokeStyle = '#484f58'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(pad.left, y1); ctx.lineTo(W - pad.right, y1); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#8b949e'; ctx.font = '10px sans-serif';
    ctx.fillText('1.0', pad.left - 4, y1 + 3);
  }

  // x labels
  ctx.fillStyle = '#8b949e'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
  const step = Math.max(1, Math.floor(labels.length / 6));
  for (let i = 0; i < labels.length; i += step) {
    const x = pad.left + (cw / (labels.length - 1)) * i;
    ctx.fillText(labels[i], x, H - 6);
  }

  // lines
  const colors = ['#58a6ff', '#3fb950', '#f85149', '#d29922'];
  datasets.forEach((ds, di) => {
    ctx.strokeStyle = colors[di % colors.length]; ctx.lineWidth = 2;
    ctx.beginPath();
    ds.data.forEach((v, i) => {
      const x = pad.left + (cw / (ds.data.length - 1)) * i;
      const y = pad.top + ch * (1 - (v - min) / (max - min));
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();

    // dot on last point
    const lastX = pad.left + cw;
    const lastY = pad.top + ch * (1 - (ds.data[ds.data.length - 1] - min) / (max - min));
    ctx.fillStyle = colors[di % colors.length];
    ctx.beginPath(); ctx.arc(lastX, lastY, 4, 0, Math.PI * 2); ctx.fill();
  });

  // legend
  if (datasets.length > 1) {
    ctx.font = '11px sans-serif';
    let lx = pad.left + 4;
    datasets.forEach((ds, di) => {
      ctx.fillStyle = colors[di % colors.length];
      ctx.fillRect(lx, pad.top + 2, 12, 3);
      ctx.fillStyle = '#e6edf3';
      ctx.textAlign = 'left';
      ctx.fillText(ds.label, lx + 16, pad.top + 8);
      lx += ctx.measureText(ds.label).width + 32;
    });
  }

  setupChartHover(canvas, labels, datasets, pad, cw, ch, min, max);
}

function setupChartHover(canvas, labels, datasets, pad, cw, ch, min, max) {
  const tooltip = document.getElementById('chartTooltip');
  const colors = ['#58a6ff', '#3fb950', '#f85149', '#d29922'];
  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    if (mx < pad.left || mx > pad.left + cw) { tooltip.classList.remove('show'); return; }
    const ratio = (mx - pad.left) / cw;
    const idx = Math.round(ratio * (labels.length - 1));
    if (idx < 0 || idx >= labels.length) { tooltip.classList.remove('show'); return; }
    let html = `<div style="margin-bottom:3px;font-weight:500;">${labels[idx]}</div>`;
    datasets.forEach((ds, di) => {
      const v = ds.data[idx];
      if (v != null) html += `<div style="color:${colors[di % colors.length]}">${ds.label}: ${v.toFixed(4)}</div>`;
    });
    tooltip.innerHTML = html;
    tooltip.classList.add('show');
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  };
  canvas.onmouseleave = () => { tooltip.classList.remove('show'); };
}

function drawDualAxisChart(canvas, labels, lineData, barData, opts = {}) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pad = { top: 14, right: 56, bottom: 28, left: 52 };
  const cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;

  ctx.clearRect(0, 0, W, H);

  const lMin = Math.min(...lineData.data) * 0.98;
  const lMax = Math.max(...lineData.data) * 1.02;
  const lRange = lMax - lMin || 1;

  const barAbs = barData.data.map(Math.abs);
  const bMax = Math.max(...barAbs) * 1.1 || 1;

  const mainChH = opts.secondLine ? ch * 0.7 : ch;
  const toLineY = v => pad.top + mainChH * (1 - (v - lMin) / lRange);
  const toBarH = v => (Math.abs(v) / bMax) * (ch * 0.3);

  ctx.strokeStyle = '#21262d'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (mainChH / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
  }

  ctx.fillStyle = '#8b949e'; ctx.font = '10px sans-serif';
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (mainChH / 4) * i;
    const val = lMax - (lMax - lMin) * (i / 4);
    ctx.textAlign = 'right';
    ctx.fillText(opts.leftFormat ? opts.leftFormat(val) : val.toFixed(2), pad.left - 4, y + 3);
  }

  // Right axis for secondary line (price)
  if (opts.secondLine) {
    const s2Min = Math.min(...opts.secondLine.data) * 0.998;
    const s2Max = Math.max(...opts.secondLine.data) * 1.002;
    const s2Range = s2Max - s2Min || 1;
    const toS2Y = v => pad.top + mainChH * (1 - (v - s2Min) / s2Range);

    ctx.fillStyle = 'rgba(210,153,34,0.7)'; ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
    for (let i = 0; i <= 4; i++) {
      const val = s2Max - (s2Max - s2Min) * (i / 4);
      const y = pad.top + (mainChH / 4) * i;
      const dec = val < 1 ? 5 : val < 100 ? 3 : 1;
      ctx.fillText(val.toFixed(dec), W - pad.right + 4, y + 3);
    }

    ctx.strokeStyle = 'rgba(210,153,34,0.65)'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    opts.secondLine.data.forEach((v, i) => {
      const x = pad.left + (cw / (opts.secondLine.data.length - 1)) * i;
      const y = toS2Y(v);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();

    const s2LastX = pad.left + cw;
    const s2LastY = toS2Y(opts.secondLine.data[opts.secondLine.data.length - 1]);
    ctx.fillStyle = 'rgba(210,153,34,0.8)';
    ctx.beginPath(); ctx.arc(s2LastX, s2LastY, 3, 0, Math.PI * 2); ctx.fill();
  }

  ctx.fillStyle = '#8b949e'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
  const step = Math.max(1, Math.floor(labels.length / 6));
  for (let i = 0; i < labels.length; i += step) {
    const x = pad.left + (cw / (labels.length - 1)) * i;
    ctx.fillText(labels[i], x, H - 6);
  }

  // Change rate bars at bottom
  const barW = Math.max(2, (cw / labels.length) * 0.6);
  const barBase = pad.top + ch * 0.85;
  barData.data.forEach((v, i) => {
    const x = pad.left + (cw / (labels.length - 1)) * i;
    const h = toBarH(v);
    ctx.fillStyle = v >= 0 ? 'rgba(63,185,80,0.5)' : 'rgba(248,81,73,0.5)';
    if (v >= 0) {
      ctx.fillRect(x - barW / 2, barBase - h, barW, h);
    } else {
      ctx.fillRect(x - barW / 2, barBase, barW, h);
    }
  });

  ctx.strokeStyle = 'rgba(128,128,128,0.3)'; ctx.lineWidth = 0.5; ctx.setLineDash([3, 3]);
  ctx.beginPath(); ctx.moveTo(pad.left, barBase); ctx.lineTo(W - pad.right, barBase); ctx.stroke();
  ctx.setLineDash([]);

  // Primary line (OI)
  ctx.strokeStyle = opts.lineColor || '#58a6ff'; ctx.lineWidth = 2;
  ctx.beginPath();
  lineData.data.forEach((v, i) => {
    const x = pad.left + (cw / (lineData.data.length - 1)) * i;
    const y = toLineY(v);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  const lastX = pad.left + cw;
  const lastY2 = toLineY(lineData.data[lineData.data.length - 1]);
  ctx.fillStyle = opts.lineColor || '#58a6ff';
  ctx.beginPath(); ctx.arc(lastX, lastY2, 4, 0, Math.PI * 2); ctx.fill();

  // Legend
  ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
  let lx = pad.left + 4;
  ctx.fillStyle = opts.lineColor || '#58a6ff';
  ctx.fillRect(lx, pad.top + 2, 12, 3);
  ctx.fillStyle = '#e6edf3';
  ctx.fillText(lineData.label, lx + 16, pad.top + 8);
  lx += ctx.measureText(lineData.label).width + 28;
  if (opts.secondLine) {
    ctx.fillStyle = 'rgba(210,153,34,0.8)';
    ctx.fillRect(lx, pad.top + 2, 12, 3);
    ctx.fillStyle = '#e6edf3';
    ctx.fillText(opts.secondLine.label, lx + 16, pad.top + 8);
    lx += ctx.measureText(opts.secondLine.label).width + 28;
  }
  ctx.fillStyle = 'rgba(63,185,80,0.7)';
  ctx.fillRect(lx, pad.top + 1, 8, 5);
  ctx.fillStyle = '#e6edf3';
  ctx.fillText(barData.label, lx + 12, pad.top + 8);

  const hoverDatasets = [lineData, { label: barData.label, data: barData.data.map(v => v * 100) }];
  if (opts.secondLine) hoverDatasets.push(opts.secondLine);
  setupChartHover(canvas, labels, hoverDatasets, pad, cw, ch, lMin, lMax);
}

function drawFundingRateChart(canvas, labels, rates) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pad = { top: 14, right: 52, bottom: 28, left: 52 };
  const cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;

  ctx.clearRect(0, 0, W, H);

  const absMax = Math.max(...rates.map(Math.abs), 0.0005) * 1.3;
  const midY = pad.top + ch / 2;
  const scale = (ch / 2) / absMax;

  ctx.strokeStyle = '#21262d'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (ch / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.fillStyle = '#8b949e'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
    const val = absMax - (absMax * 2) * (i / 4);
    ctx.fillText((val * 100).toFixed(3) + '%', pad.left - 4, y + 3);
  }

  ctx.strokeStyle = '#f0883e'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(pad.left, midY); ctx.lineTo(W - pad.right, midY); ctx.stroke();
  ctx.setLineDash([]);

  const barW = Math.max(3, (cw / rates.length) * 0.7);
  rates.forEach((r, i) => {
    const x = pad.left + (cw / (rates.length - 1)) * i;
    const h = Math.abs(r) * scale;
    if (r >= 0) {
      const intensity = Math.min(1, Math.abs(r) / 0.001);
      ctx.fillStyle = `rgba(248,81,73,${0.3 + intensity * 0.5})`;
      ctx.fillRect(x - barW / 2, midY - h, barW, h);
    } else {
      const intensity = Math.min(1, Math.abs(r) / 0.001);
      ctx.fillStyle = `rgba(63,185,80,${0.3 + intensity * 0.5})`;
      ctx.fillRect(x - barW / 2, midY, barW, h);
    }
  });

  let cumul = 0;
  const cumulData = rates.map(r => { cumul += r; return cumul; });
  const cMin = Math.min(...cumulData, 0);
  const cMax = Math.max(...cumulData, 0);
  const cRange = cMax - cMin || 0.001;
  const toCY = v => pad.top + ch * 0.1 + (ch * 0.8) * (1 - (v - cMin) / cRange);

  ctx.strokeStyle = 'rgba(210,153,34,0.7)'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  cumulData.forEach((v, i) => {
    const x = pad.left + (cw / (cumulData.length - 1)) * i;
    i === 0 ? ctx.moveTo(x, toCY(v)) : ctx.lineTo(x, toCY(v));
  });
  ctx.stroke();

  ctx.textAlign = 'left'; ctx.fillStyle = 'rgba(210,153,34,0.8)'; ctx.font = '10px sans-serif';
  ctx.fillText(`累计 ${(cumul * 100).toFixed(3)}%`, W - pad.right + 4, toCY(cumul) + 3);

  ctx.fillStyle = '#8b949e'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
  const step = Math.max(1, Math.floor(labels.length / 6));
  for (let i = 0; i < labels.length; i += step) {
    const x = pad.left + (cw / (labels.length - 1)) * i;
    ctx.fillText(labels[i], x, H - 6);
  }

  ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
  let lx = pad.left + 4;
  ctx.fillStyle = 'rgba(248,81,73,0.7)';
  ctx.fillRect(lx, pad.top + 1, 8, 5);
  ctx.fillStyle = '#e6edf3';
  ctx.fillText('正费率(多付空)', lx + 12, pad.top + 8);
  lx += 100;
  ctx.fillStyle = 'rgba(63,185,80,0.7)';
  ctx.fillRect(lx, pad.top + 1, 8, 5);
  ctx.fillStyle = '#e6edf3';
  ctx.fillText('负费率(空付多)', lx + 12, pad.top + 8);
  lx += 100;
  ctx.fillStyle = 'rgba(210,153,34,0.7)';
  ctx.fillRect(lx, pad.top + 1, 12, 3);
  ctx.fillStyle = '#e6edf3';
  ctx.fillText('累计费率', lx + 16, pad.top + 8);

  setupChartHover(canvas, labels,
    [{ label: '费率', data: rates.map(r => r * 100) }, { label: '累计', data: cumulData.map(v => v * 100) }],
    pad, cw, ch, -absMax * 100, absMax * 100);
}

function drawBarChart(canvas, labels, buyData, sellData, ratioData) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pad = { top: 10, right: ratioData ? 36 : 12, bottom: 28, left: 48 };
  const cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;

  const allVals = [...buyData, ...sellData];
  const max = Math.max(...allVals) * 1.1;

  ctx.clearRect(0, 0, W, H);

  const barW = (cw / labels.length) * 0.35;
  const gap = cw / labels.length;

  // grid
  ctx.strokeStyle = '#21262d'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (ch / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.fillStyle = '#8b949e'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(formatNum(max - (max / 4) * i), pad.left - 4, y + 3);
  }

  labels.forEach((l, i) => {
    const cx = pad.left + gap * i + gap / 2;
    const bh = (buyData[i] / max) * ch;
    const sh = (sellData[i] / max) * ch;
    ctx.fillStyle = '#3fb95080';
    ctx.fillRect(cx - barW - 1, pad.top + ch - bh, barW, bh);
    ctx.fillStyle = '#f8514980';
    ctx.fillRect(cx + 1, pad.top + ch - sh, barW, sh);

    if (i % Math.max(1, Math.floor(labels.length / 6)) === 0) {
      ctx.fillStyle = '#8b949e'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(l, cx, H - 6);
    }
  });

  // Buy/sell ratio trend line overlay
  if (ratioData && ratioData.length > 1) {
    const ratioMax = Math.max(...ratioData) * 1.05;
    const ratioMin = Math.min(...ratioData) * 0.95;
    const ratioRange = ratioMax - ratioMin || 0.1;
    const toRatioY = v => pad.top + ch - ((v - ratioMin) / ratioRange) * ch;

    // Draw 1.0 baseline
    const baseY = toRatioY(1.0);
    if (baseY > pad.top && baseY < pad.top + ch) {
      ctx.setLineDash([3, 3]);
      ctx.strokeStyle = 'rgba(255,200,0,0.3)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(pad.left, baseY); ctx.lineTo(W - pad.right, baseY); ctx.stroke();
      ctx.setLineDash([]);
    }

    // Draw ratio line
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(255,200,0,0.55)'; ctx.lineWidth = 1.5;
    ratioData.forEach((v, i) => {
      const x = pad.left + gap * i + gap / 2;
      const y = toRatioY(v);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();

    // Right axis labels for ratio
    ctx.fillStyle = 'rgba(255,200,0,0.6)'; ctx.font = '9px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(ratioMax.toFixed(2), W - pad.right + 3, pad.top + 8);
    ctx.fillText(ratioMin.toFixed(2), W - pad.right + 3, pad.top + ch);
    if (baseY > pad.top + 10 && baseY < pad.top + ch - 10) {
      ctx.fillText('1.00', W - pad.right + 3, baseY + 3);
    }
  }

  // legend
  ctx.font = '11px sans-serif';
  ctx.fillStyle = '#3fb950'; ctx.fillRect(pad.left + 4, pad.top + 2, 12, 3);
  ctx.fillStyle = '#e6edf3'; ctx.textAlign = 'left'; ctx.fillText('买入', pad.left + 20, pad.top + 8);
  ctx.fillStyle = '#f85149'; ctx.fillRect(pad.left + 56, pad.top + 2, 12, 3);
  ctx.fillStyle = '#e6edf3'; ctx.fillText('卖出', pad.left + 72, pad.top + 8);
  if (ratioData) {
    ctx.fillStyle = 'rgba(255,200,0,0.6)'; ctx.fillRect(pad.left + 108, pad.top + 2, 12, 3);
    ctx.fillStyle = '#8b949e'; ctx.fillText('买卖比', pad.left + 124, pad.top + 8);
  }

  const hoverSeries = [
    { label: '买入', data: buyData },
    { label: '卖出', data: sellData }
  ];
  if (ratioData) hoverSeries.push({ label: '买卖比', data: ratioData });
  setupChartHover(canvas, labels, hoverSeries, pad, cw, ch, 0, max);
}

function calcRSI(closes, period = 14) {
  const rsi = new Array(closes.length).fill(null);
  if (closes.length < period + 1) return rsi;
  let gainSum = 0, lossSum = 0;
  for (let i = 1; i <= period; i++) {
    const d = closes[i] - closes[i - 1];
    if (d > 0) gainSum += d; else lossSum -= d;
  }
  let avgGain = gainSum / period, avgLoss = lossSum / period;
  rsi[period] = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);
  for (let i = period + 1; i < closes.length; i++) {
    const d = closes[i] - closes[i - 1];
    avgGain = (avgGain * (period - 1) + Math.max(d, 0)) / period;
    avgLoss = (avgLoss * (period - 1) + Math.max(-d, 0)) / period;
    rsi[i] = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);
  }
  return rsi;
}

function ts2klineLabel(ts, tf) {
  const d = new Date(ts);
  if (tf === '1d') return `${d.getMonth()+1}/${d.getDate()}`;
  if (tf === '4h') return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:00`;
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function calcMA(closes, period) {
  const ma = new Array(closes.length).fill(null);
  for (let i = period - 1; i < closes.length; i++) {
    let sum = 0;
    for (let j = i - period + 1; j <= i; j++) sum += closes[j];
    ma[i] = sum / period;
  }
  return ma;
}
function calcEMA(closes, period) {
  const k = 2 / (period + 1);
  const ema = [closes[0]];
  for (let i = 1; i < closes.length; i++) {
    ema.push(closes[i] * k + ema[i - 1] * (1 - k));
  }
  return ema;
}

function drawCandlestick(canvas, klines, tf) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pad = { top: 12, right: 60, bottom: 28, left: 10 };
  const cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;

  const highs = klines.map(k => k.high);
  const lows = klines.map(k => k.low);
  let pMin = Math.min(...lows), pMax = Math.max(...highs);
  const pRange = pMax - pMin || 1;
  pMin -= pRange * 0.02; pMax += pRange * 0.02;

  ctx.clearRect(0, 0, W, H);

  const candleW = Math.max(2, (cw / klines.length) * 0.65);
  const gap = cw / klines.length;

  const priceToY = (p) => pad.top + ch * (1 - (p - pMin) / (pMax - pMin));

  // grid
  ctx.strokeStyle = '#21262d'; ctx.lineWidth = 0.5;
  ctx.fillStyle = '#8b949e'; ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
  for (let i = 0; i <= 5; i++) {
    const price = pMin + (pMax - pMin) * (1 - i / 5);
    const y = pad.top + (ch / 5) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    const decimals = price < 1 ? 6 : price < 100 ? 4 : 2;
    ctx.fillText(price.toFixed(decimals), W - pad.right + 4, y + 3);
  }

  // x labels
  ctx.fillStyle = '#8b949e'; ctx.textAlign = 'center';
  const labelStep = Math.max(1, Math.floor(klines.length / 8));
  for (let i = 0; i < klines.length; i += labelStep) {
    const x = pad.left + gap * i + gap / 2;
    ctx.fillText(ts2klineLabel(klines[i].openTime, tf), x, H - 6);
  }

  // volume bars (rendered first so candles draw on top)
  const volumes = klines.map(k => k.volume);
  const maxVol = Math.max(...volumes);
  const volHeight = ch * 0.2;
  klines.forEach((k, i) => {
    const cx = pad.left + gap * i + gap / 2;
    const isUp = k.close >= k.open;
    const vh = (k.volume / maxVol) * volHeight;
    ctx.fillStyle = isUp ? '#3fb95030' : '#f8514930';
    ctx.fillRect(cx - candleW / 2, pad.top + ch - vh, candleW, vh);
  });

  // candles
  klines.forEach((k, i) => {
    const cx = pad.left + gap * i + gap / 2;
    const isUp = k.close >= k.open;
    const color = isUp ? '#3fb950' : '#f85149';

    // wick
    ctx.strokeStyle = color; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx, priceToY(k.high));
    ctx.lineTo(cx, priceToY(k.low));
    ctx.stroke();

    // body
    const bodyTop = priceToY(Math.max(k.open, k.close));
    const bodyBot = priceToY(Math.min(k.open, k.close));
    const bodyH = Math.max(1, bodyBot - bodyTop);
    if (isUp) {
      ctx.strokeStyle = color; ctx.lineWidth = 1;
      ctx.strokeRect(cx - candleW / 2, bodyTop, candleW, bodyH);
    } else {
      ctx.fillStyle = color;
      ctx.fillRect(cx - candleW / 2, bodyTop, candleW, bodyH);
    }
  });

  // MA lines
  const closes = klines.map(k => k.close);
  const maConfigs = [
    { period: 5, color: '#d29922', label: 'MA5' },
    { period: 20, color: '#58a6ff', label: 'MA20' },
    { period: 60, color: '#bc8cff', label: 'MA60' },
  ];
  maConfigs.forEach(({ period, color, label }) => {
    if (klines.length < period) return;
    const ma = calcMA(closes, period);
    ctx.strokeStyle = color; ctx.lineWidth = 1.2;
    ctx.beginPath();
    let started = false;
    ma.forEach((v, i) => {
      if (v === null) return;
      const x = pad.left + gap * i + gap / 2;
      const y = priceToY(v);
      if (!started) { ctx.moveTo(x, y); started = true; }
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
  });

  // MA legend
  ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
  let legendX = pad.left + 4;
  maConfigs.forEach(({ period, color, label }) => {
    if (klines.length < period) return;
    const ma = calcMA(closes, period);
    const lastVal = ma.filter(v => v !== null).pop();
    if (!lastVal) return;
    const dec = lastVal < 1 ? 6 : lastVal < 100 ? 4 : 2;
    ctx.fillStyle = color;
    ctx.fillRect(legendX, pad.top + 2, 10, 3);
    ctx.fillText(`${label}: ${lastVal.toFixed(dec)}`, legendX + 14, pad.top + 8);
    legendX += ctx.measureText(`${label}: ${lastVal.toFixed(dec)}`).width + 24;
  });

  // latest price line
  const lastPrice = klines[klines.length - 1].close;
  const lastY = priceToY(lastPrice);
  const lastColor = klines[klines.length - 1].close >= klines[klines.length - 1].open ? '#3fb950' : '#f85149';
  ctx.strokeStyle = lastColor; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
  ctx.beginPath(); ctx.moveTo(pad.left, lastY); ctx.lineTo(W - pad.right, lastY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = lastColor;
  const decimals = lastPrice < 1 ? 6 : lastPrice < 100 ? 4 : 2;
  ctx.fillRect(W - pad.right, lastY - 8, 56, 16);
  ctx.fillStyle = '#fff'; ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(lastPrice.toFixed(decimals), W - pad.right + 4, lastY + 3);

  // Funding rate annotations on K-line chart
  const sd = window._lastSmartData;
  if (sd && sd.fundingRateHist && sd.fundingRateHist.length > 0) {
    const kStart = klines[0].openTime;
    const kEnd = klines[klines.length - 1].openTime;
    const tfMs = klines.length > 1 ? klines[1].openTime - klines[0].openTime : 3600000;
    const frEvents = sd.fundingRateHist.filter(f => {
      const ft = f.fundingTime;
      return ft >= kStart && ft <= kEnd + tfMs;
    });

    frEvents.forEach(f => {
      const rate = parseFloat(f.fundingRate);
      if (Math.abs(rate) < 0.0003) return;
      const ft = f.fundingTime;
      const kIdx = klines.findIndex((k, i) => {
        const nextT = i < klines.length - 1 ? klines[i + 1].openTime : k.openTime + tfMs;
        return ft >= k.openTime && ft < nextT;
      });
      if (kIdx < 0) return;
      const x = pad.left + gap * kIdx + gap / 2;
      const isHigh = rate > 0;
      const markerY = isHigh ? pad.top + 2 : pad.top + 14;
      ctx.fillStyle = isHigh ? 'rgba(248,81,73,0.75)' : 'rgba(63,185,80,0.75)';
      ctx.beginPath();
      if (isHigh) {
        ctx.moveTo(x, markerY + 8); ctx.lineTo(x - 4, markerY); ctx.lineTo(x + 4, markerY);
      } else {
        ctx.moveTo(x, markerY); ctx.lineTo(x - 4, markerY + 8); ctx.lineTo(x + 4, markerY + 8);
      }
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = isHigh ? '#f85149' : '#3fb950';
      ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText((rate * 100).toFixed(2) + '%', x, isHigh ? markerY + 18 : markerY - 2);
    });
  }
}

function drawRSIChart(canvas, rsiLines, klines, tf) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pad = { top: 8, right: 60, bottom: 28, left: 10 };
  const cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;
  const dataLen = klines.length;
  const gap = cw / dataLen;

  ctx.clearRect(0, 0, W, H);

  const yToCanvas = (v) => pad.top + ch * (1 - v / 100);

  // overbought / oversold zones
  ctx.fillStyle = '#f8514910';
  ctx.fillRect(pad.left, yToCanvas(100), cw, yToCanvas(70) - yToCanvas(100));
  ctx.fillStyle = '#3fb95010';
  ctx.fillRect(pad.left, yToCanvas(30), cw, yToCanvas(0) - yToCanvas(30));

  // grid lines at 20, 50, 80
  [20, 50, 80].forEach(v => {
    const y = yToCanvas(v);
    ctx.strokeStyle = v === 50 ? '#484f58' : '#30363d';
    ctx.lineWidth = 1; ctx.setLineDash(v === 50 ? [4, 4] : [2, 4]);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#8b949e'; ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(v.toString(), W - pad.right + 4, y + 3);
  });

  // x labels
  ctx.fillStyle = '#8b949e'; ctx.textAlign = 'center';
  const labelStep = Math.max(1, Math.floor(dataLen / 8));
  for (let i = 0; i < dataLen; i += labelStep) {
    const x = pad.left + gap * i + gap / 2;
    ctx.fillText(ts2klineLabel(klines[i].openTime, tf), x, H - 6);
  }

  // draw each RSI line
  rsiLines.forEach(({ period, color, data }) => {
    ctx.strokeStyle = color; ctx.lineWidth = 1.2;
    ctx.beginPath();
    let started = false;
    data.forEach((v, i) => {
      if (v === null) return;
      const x = pad.left + gap * i + gap / 2;
      const y = yToCanvas(v);
      if (!started) { ctx.moveTo(x, y); started = true; }
      else ctx.lineTo(x, y);
    });
    ctx.stroke();

    // dot on last point
    const lastVal = data[data.length - 1];
    if (lastVal !== null) {
      const lx = pad.left + gap * (data.length - 1) + gap / 2;
      const ly = yToCanvas(lastVal);
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(lx, ly, 3, 0, Math.PI * 2); ctx.fill();
    }
  });

  // legend with current values
  ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
  let legendX = pad.left + 4;
  rsiLines.forEach(({ period, color, data }) => {
    const lastVal = data.filter(v => v !== null).pop();
    if (!lastVal) return;
    const label = `RSI${period}: ${lastVal.toFixed(1)}`;
    ctx.fillStyle = color;
    ctx.fillRect(legendX, pad.top + 1, 10, 3);
    ctx.fillText(label, legendX + 14, pad.top + 7);
    legendX += ctx.measureText(label).width + 24;
  });
}

async function fetchAndDrawKlines() {
  try {
    const res = await fetch(`/api/klines?symbol=${symbol}&interval=${currentTF}&limit=100`);
    const raw = await res.json();
    if (raw.error) return;
    const klines = raw.map(k => ({
      openTime: k[0], open: parseFloat(k[1]), high: parseFloat(k[2]),
      low: parseFloat(k[3]), close: parseFloat(k[4]), volume: parseFloat(k[5]),
    }));
    const closes = klines.map(k => k.close);
    const rsiLines = [
      { period: 6, color: '#d29922', data: calcRSI(closes, 6) },
      { period: 12, color: '#58a6ff', data: calcRSI(closes, 12) },
      { period: 24, color: '#bc8cff', data: calcRSI(closes, 24) },
    ];

    lastKlines = klines;
    checkRSIAlerts(rsiLines[0].data);
    requestAnimationFrame(() => {
      drawCandlestick(document.getElementById('c-kline'), klines, currentTF);
      drawRSIChart(document.getElementById('c-rsi'), rsiLines, klines, currentTF);
      setupOverlay();
    });
    renderEntryRecommendation(klines, rsiLines[0].data);
  } catch (e) {
    console.error('Kline fetch error:', e);
  }
}

function renderEntryRecommendation(klines, rsi6) {
  const el = document.getElementById('entryRec');
  if (!klines || klines.length < 30) { el.classList.remove('show'); return; }

  const closes = klines.map(k => k.close);
  const lows = klines.map(k => k.low);
  const highs = klines.map(k => k.high);
  const cur = closes[closes.length - 1];

  const ma20 = closes.slice(-20).reduce((a, b) => a + b, 0) / 20;
  const ma60 = closes.length >= 60 ? closes.slice(-60).reduce((a, b) => a + b, 0) / 60 : ma20;

  // Support: recent N-bar lows
  const recentLows = lows.slice(-30);
  const support = Math.min(...recentLows.slice(-20));
  const support2 = recentLows.sort((a, b) => a - b)[Math.floor(recentLows.length * 0.1)];

  // Resistance: recent highs
  const recentHighs = highs.slice(-30);
  const resistance = Math.max(...recentHighs.slice(-10));

  // RSI
  const latestRSI = rsi6[rsi6.length - 1] || 50;

  // MACD
  const macd = calcMACD(closes);
  const lastMACD = macd[macd.length - 1] || {};
  const prevMACD = macd[macd.length - 2] || {};
  const macdCrossing = lastMACD.dif > lastMACD.dea && prevMACD.dif <= prevMACD.dea;
  const macdConverging = lastMACD.dif < lastMACD.dea && (lastMACD.dif - lastMACD.dea) > (prevMACD.dif - prevMACD.dea);

  // Entry calculation
  let entryPrice, stopLoss, targetPrice;
  let reasons = [];
  let signal = 'neutral';

  // Priority 1: Near MA20 support
  const distToMA20 = (cur - ma20) / ma20;
  if (distToMA20 > -0.03 && distToMA20 < 0.02) {
    entryPrice = ma20;
    reasons.push('价格接近 MA20 支撑位');
  }

  // Priority 2: Near recent support
  const distToSupport = (cur - support) / support;
  if (distToSupport < 0.05) {
    entryPrice = entryPrice ? Math.max(entryPrice, support) : support;
    reasons.push(`接近近期支撑 $${support.toFixed(4)}`);
  }

  // Priority 3: RSI signals
  if (latestRSI < 35) {
    reasons.push(`RSI(6)=${latestRSI.toFixed(1)} 超卖区`);
    signal = 'buy';
  } else if (latestRSI < 50) {
    reasons.push(`RSI(6)=${latestRSI.toFixed(1)} 偏低`);
  }

  // Priority 4: MACD
  if (macdCrossing) {
    reasons.push('MACD 刚金叉');
    signal = 'buy';
  } else if (macdConverging) {
    reasons.push('MACD 即将金叉（DIF向DEA收敛）');
  }

  // Priority 5: MA alignment
  if (cur > ma20 && ma20 > ma60) {
    reasons.push('均线多头排列 (价格>MA20>MA60)');
    if (signal !== 'buy') signal = 'hold';
  }

  // Priority 6: Smart money (from fetchData)
  const sd = window._lastSmartData;
  if (sd && sd.topPositions && sd.topPositions.length >= 3) {
    const posArr = sd.topPositions;
    const latR = parseFloat(posArr[posArr.length - 1].longShortRatio);
    const prev3 = posArr.slice(-3).map(d => parseFloat(d.longShortRatio));
    const posTrend = prev3[2] - prev3[0];
    if (latR > 1.1 && posTrend > 0.05) { reasons.push(`大户持续加多 (${latR.toFixed(2)}↑)`); signal = signal === 'wait' ? 'hold' : signal; }
    else if (latR < 0.9 && posTrend < -0.05) { reasons.push(`大户持续减多 (${latR.toFixed(2)}↓)`); }
  }
  if (sd && sd.takerVol && sd.takerVol.length >= 3) {
    const tvArr = sd.takerVol;
    const latBS = parseFloat(tvArr[tvArr.length - 1].buySellRatio);
    const prev3 = tvArr.slice(-3).map(d => parseFloat(d.buySellRatio));
    const bsTrend = prev3[2] - prev3[0];
    if (latBS > 1.15 && bsTrend > 0) { reasons.push(`主动买入增强 (${latBS.toFixed(2)}↑)`); }
    else if (latBS < 0.85 && bsTrend < 0) { reasons.push(`主动卖出增强 (${latBS.toFixed(2)}↓)`); }
  }

  if (!entryPrice) entryPrice = Math.min(ma20, support * 1.01);
  if (entryPrice > cur) entryPrice = cur * 0.995;
  stopLoss = Math.min(support * 0.97, entryPrice * 0.95);
  targetPrice = Math.max(resistance, entryPrice * 1.1);

  if (reasons.length === 0) {
    reasons.push('暂无明确入场信号，建议观望');
    signal = 'wait';
  }

  const signalText = signal === 'buy' ? '🟢 建议买入' : signal === 'hold' ? '🟡 持有/加仓' : '⚪ 观望等待';
  const riskReward = (entryPrice - stopLoss) > 0 ? ((targetPrice - entryPrice) / (entryPrice - stopLoss)).toFixed(1) : '--';

  // --- Sell recommendation ---
  let sellPrice, sellStop, sellTarget;
  let sellReasons = [];
  let sellSignal = 'neutral';

  const macdDeathCross = lastMACD.dif < lastMACD.dea && prevMACD.dif >= prevMACD.dea;
  const macdDiverging = lastMACD.dif > lastMACD.dea && (lastMACD.dif - lastMACD.dea) < (prevMACD.dif - prevMACD.dea);

  if (distToMA20 > 0.05) {
    sellReasons.push(`价格远高于 MA20 ${(distToMA20 * 100).toFixed(1)}%`);
  }
  const distToResist = (resistance - cur) / cur;
  if (distToResist < 0.02) {
    sellReasons.push(`接近近期阻力 $${resistance.toFixed(4)}`);
    sellSignal = 'sell';
  }
  if (latestRSI > 70) {
    sellReasons.push(`RSI(6)=${latestRSI.toFixed(1)} 超买区`);
    sellSignal = 'sell';
  } else if (latestRSI > 60) {
    sellReasons.push(`RSI(6)=${latestRSI.toFixed(1)} 偏高`);
  }
  if (macdDeathCross) {
    sellReasons.push('MACD 刚死叉');
    sellSignal = 'sell';
  } else if (macdDiverging) {
    sellReasons.push('MACD 动能衰减（柱体缩短）');
  }
  if (cur < ma20 && ma20 < ma60) {
    sellReasons.push('均线空头排列 (价格<MA20<MA60)');
    sellSignal = 'sell';
  }

  // Smart money sell signals
  if (sd && sd.topPositions && sd.topPositions.length >= 3) {
    const posArr = sd.topPositions;
    const latR = parseFloat(posArr[posArr.length - 1].longShortRatio);
    const prev3 = posArr.slice(-3).map(d => parseFloat(d.longShortRatio));
    const posTrend = prev3[2] - prev3[0];
    if (latR < 0.9 && posTrend < -0.05) { sellReasons.push(`大户持续减多 (${latR.toFixed(2)}↓)`); sellSignal = 'sell'; }
    else if (latR > 1.1 && posTrend > 0.05) { /* long signal, skip sell */ }
    else if (posTrend < -0.1) { sellReasons.push(`大户多空比快速下降`); }
  }
  if (sd && sd.takerVol && sd.takerVol.length >= 3) {
    const tvArr = sd.takerVol;
    const latBS = parseFloat(tvArr[tvArr.length - 1].buySellRatio);
    const prev3 = tvArr.slice(-3).map(d => parseFloat(d.buySellRatio));
    const bsTrend = prev3[2] - prev3[0];
    if (latBS < 0.85 && bsTrend < 0) { sellReasons.push(`主动卖出增强 (${latBS.toFixed(2)}↓)`); sellSignal = 'sell'; }
  }

  sellPrice = Math.max(resistance * 0.99, cur * 1.005);
  sellStop = resistance * 1.03;
  sellTarget = Math.min(support, sellPrice * 0.9);

  if (sellReasons.length === 0) {
    sellReasons.push('暂无明确卖出信号');
    sellSignal = 'wait';
  }

  const sellSignalText = sellSignal === 'sell' ? '🔴 建议卖出/减仓' : sellSignal === 'wait' ? '⚪ 暂无卖出信号' : '🟡 注意风险';
  const sellRR = (sellStop - sellPrice) > 0 ? ((sellPrice - sellTarget) / (sellStop - sellPrice)).toFixed(1) : '--';

  // Score comparison: determine dominant direction
  const buyScore = (signal === 'buy' ? 3 : signal === 'hold' ? 1 : 0) + reasons.length;
  const sellScore = (sellSignal === 'sell' ? 3 : 0) + sellReasons.length;
  const dominant = buyScore > sellScore ? 'long' : sellScore > buyScore ? 'short' : 'neutral';

  const dominantLabel = dominant === 'long' ? '📈 主导方向：<span style="color:var(--green);font-weight:700;">做多</span>'
    : dominant === 'short' ? '📉 主导方向：<span style="color:var(--red);font-weight:700;">做空/卖出</span>'
    : '⚖️ 方向：<span style="color:var(--yellow);font-weight:700;">多空博弈中</span>';

  const longOpacity = dominant === 'short' ? 'opacity:0.5;' : '';
  const shortOpacity = dominant === 'long' ? 'opacity:0.5;' : '';

  el.innerHTML = `
    <h3 style="color:var(--yellow);margin-bottom:4px;">📍 点位推荐 (${currentTF})</h3>
    <div style="margin-bottom:14px;font-size:15px;">${dominantLabel} <span style="font-size:12px;color:var(--text2);margin-left:10px;">多方${buyScore}分 vs 空方${sellScore}分</span></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div style="${longOpacity}">
        <div style="font-size:13px;font-weight:600;color:var(--green);margin-bottom:8px;">📈 做多 ${signalText}</div>
        <div class="entry-rec-grid">
          <div class="entry-rec-card"><div class="label">入场价</div><div class="value buy">$${entryPrice.toFixed(4)}</div></div>
          <div class="entry-rec-card"><div class="label">止损</div><div class="value stop">$${stopLoss.toFixed(4)}</div></div>
          <div class="entry-rec-card"><div class="label">目标</div><div class="value target">$${targetPrice.toFixed(4)}</div></div>
          <div class="entry-rec-card"><div class="label">盈亏比</div><div class="value">${riskReward}:1</div></div>
        </div>
        <div class="entry-rec-reasons"><ul>${reasons.map(r => `<li>${r}</li>`).join('')}</ul></div>
      </div>
      <div style="${shortOpacity}">
        <div style="font-size:13px;font-weight:600;color:var(--red);margin-bottom:8px;">📉 做空 ${sellSignalText}</div>
        <div class="entry-rec-grid">
          <div class="entry-rec-card"><div class="label">卖出价</div><div class="value stop">$${sellPrice.toFixed(4)}</div></div>
          <div class="entry-rec-card"><div class="label">止损</div><div class="value buy">$${sellStop.toFixed(4)}</div></div>
          <div class="entry-rec-card"><div class="label">目标</div><div class="value target">$${sellTarget.toFixed(4)}</div></div>
          <div class="entry-rec-card"><div class="label">盈亏比</div><div class="value">${sellRR}:1</div></div>
        </div>
        <div class="entry-rec-reasons"><ul>${sellReasons.map(r => `<li>${r}</li>`).join('')}</ul></div>
      </div>
    </div>
    <div style="margin-top:10px;font-size:11px;color:var(--text2);">* 仅供参考，不构成投资建议。当前价: $${cur.toFixed(4)} | MA20: $${ma20.toFixed(4)} | MA60: $${ma60.toFixed(4)} | 支撑: $${support.toFixed(4)} | 阻力: $${resistance.toFixed(4)}</div>
  `;
  el.classList.add('show');
}

    drawLineChart(
      document.getElementById('c-top-pos'),
      data.topPositions.map(d => ts2time(d.timestamp)),
      [{ label: '多空比', data: data.topPositions.map(d => parseFloat(d.longShortRatio)) }]
    );

    // Accounts comparison
    drawLineChart(
      document.getElementById('c-accounts'),
      data.topAccounts.map(d => ts2time(d.timestamp)),
      [
        { label: '大户', data: data.topAccounts.map(d => parseFloat(d.longShortRatio)) },
        { label: '全网', data: data.globalRatio.map(d => parseFloat(d.longShortRatio)) },
      ]
    );

    // OI chart with change rate + price overlay
    const oiValues = data.oiHist.map(d => parseFloat(d.sumOpenInterestValue));
    const oiChanges = oiValues.map((v, i) => i === 0 ? 0 : (v - oiValues[i - 1]) / oiValues[i - 1]);
    const oiPrices = data.oiHist.map(d => {
      const oi = parseFloat(d.sumOpenInterest);
      const val = parseFloat(d.sumOpenInterestValue);
      return oi > 0 ? val / oi : 0;
    });
    drawDualAxisChart(
      document.getElementById('c-oi'),
      data.oiHist.map(d => ts2time(d.timestamp)),
      { label: 'OI (USDT)', data: oiValues },
      { label: 'OI变化率', data: oiChanges },
      {
        lineColor: '#58a6ff',
        leftFormat: v => v >= 1e9 ? (v / 1e9).toFixed(1) + 'B' : (v / 1e6).toFixed(1) + 'M',
        secondLine: { label: '价格', data: oiPrices }
      }
    );

    // Funding rate history chart
    if (data.fundingRateHist && data.fundingRateHist.length > 0) {
      const frHist = data.fundingRateHist.slice(-60);
      drawFundingRateChart(
        document.getElementById('c-funding'),
        frHist.map(d => {
          const t = new Date(d.fundingTime);
          return `${(t.getMonth()+1).toString().padStart(2,'0')}/${t.getDate().toString().padStart(2,'0')} ${t.getHours().toString().padStart(2,'0')}:00`;
        }),
        frHist.map(d => parseFloat(d.fundingRate))
      );
    }

    // Taker volume bar chart with ratio overlay
    drawBarChart(
      document.getElementById('c-taker'),
      data.takerVol.map(d => ts2time(d.timestamp)),
      data.takerVol.map(d => parseFloat(d.buyVol)),
      data.takerVol.map(d => parseFloat(d.sellVol)),
      data.takerVol.map(d => parseFloat(d.buyVol) / (parseFloat(d.sellVol) || 1)),
    );
  });
}

async function fetchData() {
  try {
    const rangeOpt = CHART_RANGE_OPTIONS.find(r => r.value === chartRange) || CHART_RANGE_OPTIONS[2];
    const res = await fetch(`/api/data?symbol=${symbol}&ratioLimit=${rangeOpt.limits.ratio}&oiLimit=${rangeOpt.limits.oi}&takerLimit=${rangeOpt.limits.taker}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    window._lastSmartData = data;
    document.getElementById('title').textContent = `${symbol} 聪明钱监控面板`;
    renderOverview(data);
    renderSignals(data);
    renderCharts(data);
    checkAlerts(data);
    fetchAndDrawKlines();
  } catch (e) {
    console.error('Fetch error:', e);
  }
}

function startCountdown() {
  remaining = interval;
  if (timer) clearInterval(timer);
  timer = setInterval(() => {
    remaining--;
    document.getElementById('countdown').textContent = `${remaining}s 后刷新`;
    if (remaining <= 0) {
      remaining = interval;
      fetchData();
    }
  }, 1000);
}

    document.getElementById('signalDetailCard').scrollIntoView({ behavior: 'smooth', block: 'start' });

}

function showSignalDetail(sym) {
  const data = rightSideResults.find(r => r.symbol === sym) || leftSideResults.find(r => r.symbol === sym) || rightSideCache[sym] || leftSideCache[sym];
  if (!data) return;
  const card = document.getElementById('signalDetailCard');
  const label = data.label || sym.replace('USDT', '');
  const isLeft = data.isLeftSide !== undefined;
  const cardTitle = isLeft ? `${label} 左侧信号分析` : `${label} 右侧信号分析`;
  const maxScore = isLeft ? 6 : 5;
  const s = data.score || 0;
  const pct = (s / maxScore) * 100;
  const barColor = s >= maxScore ? 'var(--green)' : s >= maxScore - 1 ? '#3fb950cc' : s >= 3 ? 'var(--yellow)' : 'var(--red)';
  const chg = data.change;
  const chgStr = chg !== undefined ? `<span style="color:${chg >= 0 ? 'var(--green)' : 'var(--red)'};">${chg >= 0 ? '+' : ''}${chg.toFixed(2)}%</span>` : '';

  const signals = (data.signals || []).map(sig => {
    let icon = '─', color = 'var(--text2)';
    if (sig.startsWith('✓')) { icon = '✓'; color = 'var(--green)'; }
    else if (sig.startsWith('✗')) { icon = '✗'; color = 'var(--red)'; }
    else if (sig.startsWith('⚠')) { icon = '⚠'; color = 'var(--yellow)'; }
    else if (sig.startsWith('◐')) { icon = '◐'; color = 'var(--yellow)'; }
    return `<div class="sd-signal-item"><span style="color:${color};font-weight:700;width:16px;">${icon}</span><span>${sig.slice(2)}</span></div>`;
  }).join('');

  card.innerHTML = `
    <div class="sd-header">
      <h3>${cardTitle}</h3>
      <button class="sd-close" onclick="closeSignalDetail()">✕</button>
    </div>
    <div class="sd-score">
      <span style="font-weight:700;font-size:18px;color:${barColor};">${s}/${maxScore}</span>
      <div class="sd-score-bar"><div class="sd-score-fill" style="width:${pct}%;background:${barColor};"></div></div>
      <span style="font-size:12px;color:var(--text2);">${isLeft ? (s >= 5 ? '深度超跌' : s >= 3 ? '左侧机会' : '信号不足') : (s >= 4 ? '强势右侧' : s >= 3 ? '右侧确认' : '信号不足')}</span>
    </div>
    <div class="sd-signals">${signals}</div>
    <div class="sd-meta">
      <span>24h: ${chgStr}</span>
      <span>周期: ${filterTF}</span>
      <span>扫描时间: ${new Date(data.ts).toLocaleTimeString('zh-CN', { hour12: false })}</span>
    </div>
  `;
  card.classList.add('show');
}

// --- Right-side trading filter ---
const FILTER_DEFS = [
  { id: 'all', label: '全部' },
  { id: 'right_side', label: '右侧交易' },
  { id: 'left_side', label: '左侧交易' },
  { id: 'rec_long', label: '推荐做多' },
  { id: 'rec_short', label: '推荐做空' },
];

function renderChartRangeBar() {
  const group = document.getElementById('chartRangeGroup');
  if (!group) return;
  group.innerHTML = CHART_RANGE_OPTIONS.map(r =>
    `<button class="filter-pill ${chartRange === r.value ? 'active' : ''}" onclick="switchChartRange('${r.value}')">${r.label}</button>`
  ).join('');
}
function switchChartRange(val) {
  chartRange = val;
  localStorage.setItem('chartRange', val);

}

function renderFilterTabs() {
  const el = document.getElementById('filterBar');
  const tabs = FILTER_DEFS.map(f => {
    const isActive = f.id === activeFilter;
    let badge = '';
    let extra = '';
    if (f.id === 'right_side') {
      if (rightSideCoins.size > 0) badge = `<span class="badge">${rightSideCoins.size}</span>`;
      if (rightSideLoading && activeFilter === 'right_side' && scanProgress.total > 0) {
        extra = `<span style="font-size:9px;color:var(--text2);margin-left:4px;">${scanProgress.done}/${scanProgress.total}</span>`;
      }
    }
    if (f.id === 'left_side') {
      if (leftSideCoins.size > 0) badge = `<span class="badge">${leftSideCoins.size}</span>`;
      if (rightSideLoading && activeFilter === 'left_side' && scanProgress.total > 0) {
        extra = `<span style="font-size:9px;color:var(--text2);margin-left:4px;">${scanProgress.done}/${scanProgress.total}</span>`;
      }
    }
    if (f.id === 'rec_long') {
      if (recLongResults.length > 0) badge = `<span class="badge">${recLongResults.length}</span>`;
      if (recLongLoading && activeFilter === 'rec_long' && scanProgress.total > 0) {
        extra = `<span style="font-size:9px;color:var(--text2);margin-left:4px;">${scanProgress.done}/${scanProgress.total}</span>`;
      }
    }
    if (f.id === 'rec_short') {
      if (recShortResults.length > 0) badge = `<span class="badge">${recShortResults.length}</span>`;
      if (recShortLoading && activeFilter === 'rec_short' && scanProgress.total > 0) {
        extra = `<span style="font-size:9px;color:var(--text2);margin-left:4px;">${scanProgress.done}/${scanProgress.total}</span>`;
      }
    }
    const loading = (f.id === 'right_side' && rightSideLoading) || (f.id === 'rec_long' && recLongLoading) || (f.id === 'rec_short' && recShortLoading) ? ' loading' : '';
    return `<span class="filter-tab${isActive ? ' active' : ''}${loading}" onclick="switchFilter('${f.id}')">${f.label}${extra}${badge}</span>`;
  }).join('');

  const tfBtns = FILTER_TF_OPTIONS.map(t =>
    `<span class="filter-pill${t.value === filterTF ? ' active' : ''}" onclick="switchFilterTF('${t.value}')">${t.label}</span>`
  ).join('');

  const rangeBtns = SCAN_RANGE_OPTIONS.map(r =>
    `<span class="filter-pill${r.value === scanTopLimit ? ' active' : ''}" onclick="switchScanRange(${r.value})">${r.label}</span>`
  ).join('');

  const sortBtns = SORT_OPTIONS.map(s =>
    `<span class="filter-pill${s.value === sortBy ? ' active' : ''}" onclick="switchSort('${s.value}')">${s.label}</span>`
  ).join('');

  el.innerHTML = `
    <div class="filter-tabs">${tabs}</div>
    <span class="filter-sep"></span>
    <div class="filter-group"><span class="filter-group-label">周期</span>${tfBtns}</div>
    <span class="filter-sep"></span>
    <div class="filter-group"><span class="filter-group-label">范围</span>${rangeBtns}</div>
    <span class="filter-sep"></span>
    <div class="filter-group"><span class="filter-group-label">排序</span>${sortBtns}</div>
  `;
}

function switchFilter(filterId) {
  activeFilter = filterId;
  saveFilterSettings();
  renderFilterTabs();
  if (filterId === 'right_side' && rightSideCoins.size === 0 && !rightSideLoading) {
    scanRightSideCoins();
  }
  if (filterId === 'left_side' && leftSideCoins.size === 0 && !rightSideLoading) {
    scanLeftSideCoins();
  }
  if (filterId === 'rec_long' && recLongResults.length === 0 && !recLongLoading) {
    scanRecCoins('long');
  }
  if (filterId === 'rec_short' && recShortResults.length === 0 && !recShortLoading) {
    scanRecCoins('short');
  }
  renderCoinTabs();
}

function clearAllScanCache() {
  rightSideCache = {};
  rightSideCoins.clear();
  rightSideResults = [];
  leftSideCache = {};
  leftSideCoins.clear();
  leftSideResults = [];
  recLongResults = [];
  recShortResults = [];
}

function switchFilterTF(tf) {
  if (tf === filterTF) return;
  filterTF = tf;
  saveFilterSettings();
  clearAllScanCache();
  renderFilterTabs();
