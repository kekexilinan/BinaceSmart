function calcMACD(closes) {
  const ema = (data, period) => {
    const k = 2 / (period + 1);
    const result = [data[0]];
    for (let i = 1; i < data.length; i++) {
      result.push(data[i] * k + result[i - 1] * (1 - k));
    }
    return result;
  };
  const ema12 = ema(closes, 12);
  const ema26 = ema(closes, 26);
  const dif = ema12.map((v, i) => v - ema26[i]);
  const dea = ema(dif, 9);
  return { dif, dea, macd: dif.map((v, i) => (v - dea[i]) * 2) };
}

async function checkCoinRightSide(sym) {
  const cached = rightSideCache[sym];
  if (cached && Date.now() - cached.ts < 5 * 60 * 1000) return cached;
  try {
    const res = await fetch(`/api/klines?symbol=${sym}&interval=${filterTF}&limit=100`);
    const raw = await res.json();
    if (raw.error || !Array.isArray(raw) || raw.length < 30) {
      return { ts: Date.now(), isRightSide: false, score: 0, signals: [], detail: '数据不足' };
    }
    const closes = raw.map(k => parseFloat(k[4]));
    const volumes = raw.map(k => parseFloat(k[5]));
    const lastPrice = closes[closes.length - 1];

    const signals = [];
    let score = 0;

    // 1. MA trend: price > MA20 && MA5 > MA20
    const ma5 = calcMA(closes, 5);
    const ma20 = calcMA(closes, 20);
    const lastMA5 = ma5[ma5.length - 1];
    const lastMA20 = ma20[ma20.length - 1];
    if (lastMA5 !== null && lastMA20 !== null) {
      const priceAboveMA20 = lastPrice > lastMA20;
      const ma5AboveMA20 = lastMA5 > lastMA20;
      if (priceAboveMA20 && ma5AboveMA20) {
        score += 2;
        signals.push('✓ 均线多排(价>MA20, MA5>MA20)');
      } else if (priceAboveMA20) {
        score += 1;
        signals.push('◐ 价格站上MA20');
      } else {
        signals.push('✗ 价格未站上MA20');
      }
    }

    // 2. RSI(6) > 50
    const rsi6 = calcRSI(closes, 6);
    const lastRSI = rsi6.filter(v => v !== null).pop();
    if (lastRSI !== null && lastRSI !== undefined) {
      if (lastRSI > 50 && lastRSI < 80) {
        score += 1;
        signals.push(`✓ RSI6=${lastRSI.toFixed(1)} (强势区)`);
      } else if (lastRSI >= 80) {
        signals.push(`⚠ RSI6=${lastRSI.toFixed(1)} (超买)`);
      } else {
        signals.push(`✗ RSI6=${lastRSI.toFixed(1)} (弱势)`);
      }
    }

    // 3. MACD golden cross (DIF > DEA)
    const { dif, dea } = calcMACD(closes);
    const lastDIF = dif[dif.length - 1];
    const lastDEA = dea[dea.length - 1];
    const prevDIF = dif[dif.length - 2];
    const prevDEA = dea[dea.length - 2];
    if (lastDIF > lastDEA) {
      if (prevDIF <= prevDEA) {
        score += 2;
        signals.push('✓ MACD刚金叉');
      } else {
        score += 1;
        signals.push('✓ MACD多头(DIF>DEA)');
      }
    } else {
      signals.push('✗ MACD空头');
    }

    // 4. Volume surge: recent 3 bars avg > prev 20 bars avg * 1.5
    if (volumes.length >= 23) {
      const recentVol = (volumes.slice(-3).reduce((a, b) => a + b, 0)) / 3;
      const prevVol = (volumes.slice(-23, -3).reduce((a, b) => a + b, 0)) / 20;
      if (prevVol > 0 && recentVol > prevVol * 1.5) {
        score += 1;
        signals.push(`✓ 放量(${(recentVol / prevVol).toFixed(1)}x)`);
      } else {
        signals.push(`✗ 未放量(${(recentVol / prevVol).toFixed(1)}x)`);
      }
    }

    // Score >= 3 is considered right-side
    const isRightSide = score >= 3;
    const detail = `[${score}/5] ${signals.join(' | ')}`;

    const result = { ts: Date.now(), isRightSide, score, signals, detail };
    rightSideCache[sym] = result;
    return result;
  } catch (e) {
    return { ts: Date.now(), isRightSide: false, score: 0, signals: [], detail: '请求失败' };
  }
}

async function pMap(items, fn, concurrency = 5) {
  const results = [];
  let idx = 0;
  async function worker() {
    while (idx < items.length) {
      const i = idx++;
      results[i] = await fn(items[i], i);
    }
  }
  await Promise.all(Array.from({ length: Math.min(concurrency, items.length) }, () => worker()));
  return results;
}

async function checkCoinLeftSide(sym) {
  const cached = leftSideCache[sym];
  if (cached && Date.now() - cached.ts < 5 * 60 * 1000) return cached;
  try {
    const res = await fetch(`/api/klines?symbol=${sym}&interval=${filterTF}&limit=100`);
    const raw = await res.json();
    if (raw.error || !Array.isArray(raw) || raw.length < 30) {
      return { ts: Date.now(), isLeftSide: false, score: 0, signals: [], detail: '数据不足' };
    }
    const closes = raw.map(k => parseFloat(k[4]));
    const volumes = raw.map(k => parseFloat(k[5]));
    const lastPrice = closes[closes.length - 1];
    const signals = [];
    let score = 0;

    // 1. RSI(6) < 30 (oversold)
    const rsi6 = calcRSI(closes, 6);
    const lastRSI = rsi6.filter(v => v !== null).pop();
    if (lastRSI !== null && lastRSI !== undefined) {
      if (lastRSI < 30) {
        score += 2;
        signals.push(`✓ RSI6=${lastRSI.toFixed(1)} (超卖)`);
      } else if (lastRSI < 40) {
        score += 1;
        signals.push(`◐ RSI6=${lastRSI.toFixed(1)} (偏弱)`);
      } else {
        signals.push(`✗ RSI6=${lastRSI.toFixed(1)} (非超卖)`);
      }
    }

    // 2. Price far below MA20
    const ma20 = calcMA(closes, 20);
    const lastMA20 = ma20[ma20.length - 1];
    if (lastMA20 !== null) {
      const deviation = (lastPrice - lastMA20) / lastMA20;
      if (deviation < -0.1) {
        score += 2;
        signals.push(`✓ 偏离MA20 ${(deviation * 100).toFixed(1)}% (深度超跌)`);
      } else if (deviation < -0.05) {
        score += 1;
        signals.push(`◐ 偏离MA20 ${(deviation * 100).toFixed(1)}%`);
      } else {
        signals.push(`✗ 偏离MA20 ${(deviation * 100).toFixed(1)}% (未超跌)`);
      }
    }

    // 3. MACD converging (DIF < DEA but gap narrowing)
    const { dif, dea } = calcMACD(closes);
    const lastDIF = dif[dif.length - 1];
    const lastDEA = dea[dea.length - 1];
    const prevDIF = dif[dif.length - 2];
    const prevDEA = dea[dea.length - 2];
    if (lastDIF < lastDEA) {
      const lastGap = Math.abs(lastDIF - lastDEA);
      const prevGap = Math.abs(prevDIF - prevDEA);
      if (lastGap < prevGap) {
        score += 1;
        signals.push('✓ MACD空头收敛(即将金叉)');
      } else {
        signals.push('✗ MACD空头发散');
      }
    } else {
      signals.push('✗ MACD已多头(非左侧)');
    }

    // 4. Volume shrinking (recent volume < avg, capitulation over)
    if (volumes.length >= 23) {
      const recentVol = (volumes.slice(-3).reduce((a, b) => a + b, 0)) / 3;
      const prevVol = (volumes.slice(-23, -3).reduce((a, b) => a + b, 0)) / 20;
      if (prevVol > 0 && recentVol < prevVol * 0.6) {
        score += 1;
        signals.push(`✓ 缩量(${(recentVol / prevVol).toFixed(1)}x 地量)`);
      } else {
        signals.push(`✗ 未缩量(${(recentVol / prevVol).toFixed(1)}x)`);
      }
    }

    const isLeftSide = score >= 3;
    const detail = `[${score}/6] ${signals.join(' | ')}`;
    const result = { ts: Date.now(), isLeftSide, score, signals, detail };
    leftSideCache[sym] = result;
    return result;
  } catch (e) {
    return { ts: Date.now(), isLeftSide: false, score: 0, signals: [], detail: '请求失败' };
  }
}

async function checkCoinDirection(sym) {
  try {
    const [klRes, posRes, takerRes] = await Promise.all([
      fetch(`/api/klines?symbol=${sym}&interval=${filterTF}&limit=60`),
      fetch(`/api/data?symbol=${sym}&ratioLimit=5&oiLimit=2&takerLimit=5`).catch(() => null),
    ].concat([]));
    const raw = await klRes.json();
    if (raw.error || !Array.isArray(raw) || raw.length < 30) return { buyScore: 0, sellScore: 0, buyReasons: [], sellReasons: [] };

    let smartData = null;
    if (posRes && posRes.ok) {
      try { smartData = await posRes.json(); } catch {}
    }

    const closes = raw.map(k => parseFloat(k[4]));
    const lows = raw.map(k => parseFloat(k[3]));
    const highs = raw.map(k => parseFloat(k[2]));
    const cur = closes[closes.length - 1];
    const ma20 = closes.slice(-20).reduce((a, b) => a + b, 0) / 20;
    const ma60 = closes.length >= 60 ? closes.slice(-60).reduce((a, b) => a + b, 0) / 60 : ma20;
    const rsi6 = calcRSI(closes, 6);
    const latestRSI = rsi6[rsi6.length - 1] || 50;
    const macd = calcMACD(closes);
    const last = macd[macd.length - 1] || {};
    const prev = macd[macd.length - 2] || {};
    const support = Math.min(...lows.slice(-20));
    const resistance = Math.max(...highs.slice(-10));
    const distMA20 = (cur - ma20) / ma20;

    let buyScore = 0, sellScore = 0;
    let buyReasons = [], sellReasons = [];
    const strat = currentStrategy.conditions;
    const getW = id => { const c = strat.find(x => x.id === id); return c ? c.weight : 0; };
    const getV = id => { const c = strat.find(x => x.id === id); return c ? c.value : '忽略'; };

    // MA cross
    const maCrossV = getV('ma_cross'), maCrossW = getW('ma_cross');
    if (maCrossV !== '忽略') {
      if (last.dif > last.dea && prev.dif <= prev.dea) { buyScore += maCrossW; buyReasons.push('MACD金叉'); }
      if (last.dif < last.dea && prev.dif >= prev.dea) { sellScore += maCrossW; sellReasons.push('MACD死叉'); }
    }

    // MA trend
    const maTrendV = getV('ma_trend'), maTrendW = getW('ma_trend');
    if (maTrendV !== '忽略') {
      if (cur > ma20 && ma20 > ma60) { buyScore += maTrendW; buyReasons.push('多头排列'); }
      if (cur < ma20 && ma20 < ma60) { sellScore += maTrendW; sellReasons.push('空头排列'); }
    }

    // RSI
    const rsiOBV = getV('rsi_ob'), rsiOBW = getW('rsi_ob');
    if (rsiOBV !== '忽略' && latestRSI > 70) { sellScore += rsiOBW; sellReasons.push('RSI超买'); }
    const rsiOSV = getV('rsi_os'), rsiOSW = getW('rsi_os');
    if (rsiOSV !== '忽略' && latestRSI < 30) { buyScore += rsiOSW; buyReasons.push('RSI超卖'); }

    // MACD cross
    const macdV = getV('macd_cross'), macdW = getW('macd_cross');
    if (macdV !== '忽略') {
      if (last.dif > last.dea && prev.dif <= prev.dea) { buyScore += macdW; buyReasons.push('MACD金叉'); }
      if (last.dif < last.dea && prev.dif >= prev.dea) { sellScore += macdW; sellReasons.push('MACD死叉'); }
    }

    // Volume surge - use candle volume
    const volV = getV('vol_surge'), volW = getW('vol_surge');
    if (volV !== '忽略') {
      const vols = raw.map(k => parseFloat(k[5]));
      const avgVol = vols.slice(-20, -1).reduce((a,b) => a+b, 0) / 19;
      if (vols[vols.length - 1] > avgVol * 2) {
        if (cur > closes[closes.length - 2]) { buyScore += volW; buyReasons.push('放量上涨'); }
        else { sellScore += volW; sellReasons.push('放量下跌'); }
      }
    }

    // EMA fast/slow crossover
    const emaV = getV('ema_fast_slow'), emaW = getW('ema_fast_slow');
    if (emaV !== '忽略' && closes.length >= 26) {
      const ema12 = calcEMA(closes, 12), ema26 = calcEMA(closes, 26);
      const eL = ema12.length - 1, eP = eL - 1;
      if (ema12[eL] > ema26[eL] && ema12[eP] <= ema26[eP]) { buyScore += emaW; buyReasons.push('EMA金叉'); }
      if (ema12[eL] < ema26[eL] && ema12[eP] >= ema26[eP]) { sellScore += emaW; sellReasons.push('EMA死叉'); }
    }

    // Bollinger Bands
    const bollV = getV('boll_band'), bollW = getW('boll_band');
    if (bollV !== '忽略' && closes.length >= 20) {
      const slice20 = closes.slice(-20);
      const bollMA = slice20.reduce((a,b) => a+b, 0) / 20;
      const stdDev = Math.sqrt(slice20.reduce((s, v) => s + (v - bollMA) ** 2, 0) / 20);
      const upper = bollMA + 2 * stdDev, lower = bollMA - 2 * stdDev;
      if (cur <= lower * 1.01) { buyScore += bollW; buyReasons.push('触布林下轨'); }
      if (cur >= upper * 0.99) { sellScore += bollW; sellReasons.push('触布林上轨'); }
    }

    // Support/resistance
    const srV = getV('support_resist'), srW = getW('support_resist');
    if (srV !== '忽略') {
      if ((cur - support) / support < 0.03) { buyScore += srW; buyReasons.push('近支撑位'); }
      if ((resistance - cur) / cur < 0.02) { sellScore += srW; sellReasons.push('近阻力位'); }
    }

    // Price action - engulfing / hammer
    const paV = getV('price_action'), paW = getW('price_action');
    if (paV !== '忽略' && raw.length >= 2) {
      const lastK = raw[raw.length - 1], prevK = raw[raw.length - 2];
      const lOpen = parseFloat(lastK[1]), lClose = parseFloat(lastK[4]), lLow = parseFloat(lastK[3]), lHigh = parseFloat(lastK[2]);
      const pOpen = parseFloat(prevK[1]), pClose = parseFloat(prevK[4]);
      const body = Math.abs(lClose - lOpen), lowerWick = Math.min(lOpen, lClose) - lLow;
      if (lClose > lOpen && lClose > pOpen && lOpen < pClose) { buyScore += paW; buyReasons.push('看涨吞没'); }
      if (lClose < lOpen && lClose < pOpen && lOpen > pClose) { sellScore += paW; sellReasons.push('看跌吞没'); }
      if (lowerWick > body * 2 && lClose > lOpen) { buyScore += paW; buyReasons.push('锤子线'); }
      const upperWick = lHigh - Math.max(lOpen, lClose);
      if (upperWick > body * 2 && lClose < lOpen) { sellScore += paW; sellReasons.push('射击之星'); }
    }

    // OI change
    const oiV = getV('oi_change'), oiW = getW('oi_change');
    if (oiV !== '忽略' && smartData && smartData.oi && smartData.oi.length >= 2) {
      const oiArr = smartData.oi;
      const latestOI = parseFloat(oiArr[oiArr.length - 1].sumOpenInterest);
      const prevOI = parseFloat(oiArr[oiArr.length - 2].sumOpenInterest);
      const oiChange = (latestOI - prevOI) / prevOI;
      if (oiChange > 0.03) {
        if (cur > closes[closes.length - 2]) { buyScore += oiW; buyReasons.push(`OI增仓+涨`); }
        else { sellScore += oiW; sellReasons.push(`OI增仓+跌`); }
      }
    }

    // Funding rate
    const frV = getV('funding_rate'), frW = getW('funding_rate');
    if (frV !== '忽略' && smartData && smartData.fundingRate && smartData.fundingRate.lastFundingRate) {
      const fr = parseFloat(smartData.fundingRate.lastFundingRate);
      if (fr < -0.0005) { buyScore += frW; buyReasons.push(`负费率(${(fr*100).toFixed(3)}%)`); }
      if (fr > 0.001) { sellScore += frW; sellReasons.push(`高费率(${(fr*100).toFixed(3)}%)`); }
    }

    // Smart money indicators
    if (smartData) {
      const topW = getW('top_ratio'), topV = getV('top_ratio');
      const pos = smartData.topPositions;
      if (topV !== '忽略' && pos && pos.length >= 2) {
        const latestR = parseFloat(pos[pos.length - 1].longShortRatio);
        const prevR = parseFloat(pos[pos.length - 2].longShortRatio);
        if (latestR > 1.1 && latestR > prevR) { buyScore += topW; buyReasons.push(`大户偏多↑(${latestR.toFixed(2)})`); }
        if (latestR < 0.9 && latestR < prevR) { sellScore += topW; sellReasons.push(`大户偏空↓(${latestR.toFixed(2)})`); }
      }
      const takerW = getW('taker_buy'), takerV = getV('taker_buy');
      const taker = smartData.takerVol;
      if (takerV !== '忽略' && taker && taker.length >= 2) {
        const latestBS = parseFloat(taker[taker.length - 1].buySellRatio);
        const prevBS = parseFloat(taker[taker.length - 2].buySellRatio);
        if (latestBS > 1.1 && latestBS > prevBS) { buyScore += takerW; buyReasons.push(`主动买入↑(${latestBS.toFixed(2)})`); }
        if (latestBS < 0.9 && latestBS < prevBS) { sellScore += takerW; sellReasons.push(`主动卖出↓(${latestBS.toFixed(2)})`); }
      }
    }

    return { buyScore, sellScore, buyReasons, sellReasons, detail: buyReasons.join(',') + ' | ' + sellReasons.join(',') };
  } catch { return { buyScore: 0, sellScore: 0, buyReasons: [], sellReasons: [] }; }
}

    }
    if (scanProgress.done % 10 === 0) renderFilterTabs();
  }, 5);

  if (isLong) recLongLoading = false; else recShortLoading = false;
  renderFilterTabs();
  renderCoinTabs();
}

function setupOverlay() {
  const hoverArea = document.getElementById('klineHoverArea');
  const overlay = document.getElementById('c-kline-overlay');
  const klineCanvas = document.getElementById('c-kline');

  const dpr = window.devicePixelRatio || 1;
  const rect = klineCanvas.getBoundingClientRect();
  overlay.width = rect.width * dpr;
  overlay.height = rect.height * dpr;
  overlay.style.width = rect.width + 'px';
  overlay.style.height = rect.height + 'px';

  hoverArea.onmousemove = (e) => {
    if (!lastKlines || !lastKlines.length) return;
    const br = klineCanvas.getBoundingClientRect();
    const mx = e.clientX - br.left;
    const my = e.clientY - br.top;
    const W = br.width, H = br.height;
    const pad = { top: 12, right: 60, bottom: 28, left: 10 };
    const cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;
    const gap = cw / lastKlines.length;

    if (mx < pad.left || mx > W - pad.right || my < pad.top || my > pad.top + ch) {
      clearOverlay(); return;
    }

    const idx = Math.min(lastKlines.length - 1, Math.max(0, Math.floor((mx - pad.left) / gap)));
    const k = lastKlines[idx];
    const cx = pad.left + gap * idx + gap / 2;

    const highs = lastKlines.map(k => k.high);
    const lows = lastKlines.map(k => k.low);
    let pMin = Math.min(...lows), pMax = Math.max(...highs);
    const pRange = pMax - pMin || 1;
    pMin -= pRange * 0.02; pMax += pRange * 0.02;
    const price = pMin + (1 - (my - pad.top) / ch) * (pMax - pMin);

    const ctx = overlay.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);

    // vertical line
    ctx.strokeStyle = '#8b949e80'; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(cx, pad.top); ctx.lineTo(cx, pad.top + ch); ctx.stroke();
    // horizontal line
    ctx.beginPath(); ctx.moveTo(pad.left, my); ctx.lineTo(W - pad.right, my); ctx.stroke();
    ctx.setLineDash([]);

    // price label on right
    const dec = price < 1 ? 6 : price < 100 ? 4 : 2;
    ctx.fillStyle = '#30363d';
    ctx.fillRect(W - pad.right, my - 9, 56, 18);
    ctx.strokeStyle = '#8b949e'; ctx.lineWidth = 0.5;
    ctx.strokeRect(W - pad.right, my - 9, 56, 18);
    ctx.fillStyle = '#e6edf3'; ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(price.toFixed(dec), W - pad.right + 4, my + 3);

    // highlight candle high/low with small ticks
    const highY = pad.top + ch * (1 - (k.high - pMin) / (pMax - pMin));
    const lowY = pad.top + ch * (1 - (k.low - pMin) / (pMax - pMin));
    const closeY = pad.top + ch * (1 - (k.close - pMin) / (pMax - pMin));
    ctx.fillStyle = '#3fb95090';
    ctx.font = '9px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(k.high.toFixed(dec), cx - 6, highY - 3);
    ctx.fillStyle = '#f8514990';
    ctx.fillText(k.low.toFixed(dec), cx - 6, lowY + 10);

    // time label on bottom
    const timeLabel = ts2klineLabel(k.openTime, currentTF);
    const tw = ctx.measureText(timeLabel).width + 12;
    ctx.fillStyle = '#30363d';
    ctx.fillRect(cx - tw / 2, pad.top + ch + 2, tw, 16);
    ctx.strokeRect(cx - tw / 2, pad.top + ch + 2, tw, 16);
    ctx.fillStyle = '#e6edf3'; ctx.textAlign = 'center';
    ctx.fillText(timeLabel, cx, pad.top + ch + 14);

    // OHLCV + amplitude + change info at top
    const isUp = k.close >= k.open;
    const ohlcEl = document.getElementById('klineOHLC');
    const d = dec;
    const amplitude = ((k.high - k.low) / k.open * 100).toFixed(2);
    let changeStr = '', changeColor = 'var(--text2)';
    if (idx > 0) {
      const prevClose = lastKlines[idx - 1].close;
      const change = ((k.close - prevClose) / prevClose * 100);
      changeColor = change >= 0 ? 'var(--green)' : 'var(--red)';
      changeStr = `<span>涨跌: <b style="color:${changeColor}">${change >= 0 ? '+' : ''}${change.toFixed(2)}%</b></span>`;
    }
    ohlcEl.innerHTML =
      `<span style="color:var(--text2)">${ts2klineLabel(k.openTime, currentTF)}</span>` +
      `<span>开: <b style="color:${isUp ? 'var(--green)' : 'var(--red)'}">${k.open.toFixed(d)}</b></span>` +
      `<span>高: <b style="color:var(--green)">${k.high.toFixed(d)}</b></span>` +
      `<span>低: <b style="color:var(--red)">${k.low.toFixed(d)}</b></span>` +
      `<span>收: <b style="color:${isUp ? 'var(--green)' : 'var(--red)'}">${k.close.toFixed(d)}</b></span>` +
      `<span>振幅: <b>${amplitude}%</b></span>` +
      changeStr +
      `<span>量: <b>${formatNum(k.volume)}</b></span>`;
  };

  hoverArea.onmouseleave = clearOverlay;
}

function clearOverlay() {
  const overlay = document.getElementById('c-kline-overlay');
  const ctx = overlay.getContext('2d');
  ctx.clearRect(0, 0, overlay.width, overlay.height);
  document.getElementById('klineOHLC').innerHTML = '';
}

async function runBacktest() {
  const sym = document.getElementById('btSymbol').value.toUpperCase();
  const interval = document.getElementById('btInterval').value;
  const bars = +document.getElementById('btBars').value;
  const resultDiv = document.getElementById('backtestResult');
  resultDiv.innerHTML = '<span style="color:var(--text2)">回测中...</span>';

  try {
    const res = await fetch(`/api/klines?symbol=${sym}&interval=${interval}&limit=${bars}`);
    const klines = await res.json();
    if (!klines || klines.length < 50) { resultDiv.innerHTML = '<span style="color:var(--red)">数据不足</span>'; return; }

    const closes = klines.map(k => parseFloat(k[4]));
    const ma7 = calcMA(closes, 7), ma25 = calcMA(closes, 25);
    const rsi = calcRSI(closes, 14);
    const macd = calcMACD(closes);
    macd.histogram = macd.macd;

    let trades = [], position = null;
    for (let i = 30; i < klines.length; i++) {
      const score = calcStrategyScore(i, closes, ma7, ma25, rsi, macd, klines);
      if (!position && score.long >= 3) {
        position = { dir: 'long', entry: closes[i], entryIdx: i };
      } else if (!position && score.short >= 3) {
        position = { dir: 'short', entry: closes[i], entryIdx: i };
      } else if (position) {
        const pnl = position.dir === 'long' ? (closes[i] / position.entry - 1) : (1 - closes[i] / position.entry);
        if (pnl <= -0.03 || pnl >= 0.05 || (position.dir === 'long' && score.short >= 3) || (position.dir === 'short' && score.long >= 3)) {
          trades.push({ ...position, exit: closes[i], exitIdx: i, pnl });
          position = null;
        }
      }
    }

    const wins = trades.filter(t => t.pnl > 0).length;
    const totalPnl = trades.reduce((s, t) => s + t.pnl, 0);
    const maxDD = trades.reduce((dd, t) => Math.min(dd, t.pnl), 0);

    // Build equity curve (cumulative PnL per bar)
    const equity = [0];
    let cumPnl = 0, tradeIdx = 0;
    for (let i = 30; i < klines.length; i++) {
      while (tradeIdx < trades.length && trades[tradeIdx].exitIdx <= i) {
        cumPnl += trades[tradeIdx].pnl;
        tradeIdx++;
      }
      equity.push(cumPnl);
    }

    // Trade detail table rows
    const tradeRows = trades.map((t, idx) => {
      const entryTime = klines[t.entryIdx] ? new Date(klines[t.entryIdx][0]).toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '-';
      const exitTime = klines[t.exitIdx] ? new Date(klines[t.exitIdx][0]).toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '-';
      const dirLabel = t.dir === 'long' ? '<span style="color:var(--green)">做多</span>' : '<span style="color:var(--red)">做空</span>';
      const pnlColor = t.pnl >= 0 ? 'var(--green)' : 'var(--red)';
      return `<tr>
        <td>${idx + 1}</td><td>${dirLabel}</td>
        <td>${entryTime}</td><td>${t.entry.toFixed(4)}</td>
        <td>${exitTime}</td><td>${t.exit.toFixed(4)}</td>
        <td style="color:${pnlColor};font-weight:600;">${(t.pnl*100).toFixed(2)}%</td>
      </tr>`;
    }).join('');

    resultDiv.innerHTML = `<div class="backtest-result">
      <div class="stat">交易次数 <span class="val">${trades.length}</span></div>
      <div class="stat">胜率 <span class="val" style="color:${wins/trades.length > 0.5 ? 'var(--green)':'var(--red)'}">${trades.length ? (wins/trades.length*100).toFixed(1) : 0}%</span></div>
      <div class="stat">总收益 <span class="val" style="color:${totalPnl>=0?'var(--green)':'var(--red)'}">${(totalPnl*100).toFixed(2)}%</span></div>
      <div class="stat">最大回撤 <span class="val" style="color:var(--red)">${(maxDD*100).toFixed(2)}%</span></div>
      <div class="stat">盈亏比 <span class="val">${trades.length ? (wins > 0 ? (trades.filter(t=>t.pnl>0).reduce((s,t)=>s+t.pnl,0)/wins / (trades.filter(t=>t.pnl<=0).length > 0 ? Math.abs(trades.filter(t=>t.pnl<=0).reduce((s,t)=>s+t.pnl,0)/(trades.length-wins)) : 1)).toFixed(2) : '0') : '--'}</span></div>
      <div style="margin-top:10px;font-size:12px;color:var(--text2);">收益曲线</div>
      <canvas id="equityCurve" width="800" height="180" style="width:100%;height:180px;margin-top:4px;border-radius:6px;background:var(--bg);"></canvas>
      <div style="margin-top:12px;font-size:12px;color:var(--text2);">交易明细</div>
      <table style="width:100%;margin-top:6px;font-size:11px;border-collapse:collapse;">
        <thead><tr style="color:var(--text2);border-bottom:1px solid var(--border);">
          <th style="padding:4px;">#</th><th>方向</th><th>开仓时间</th><th>开仓价</th><th>平仓时间</th><th>平仓价</th><th>收益</th>
        </tr></thead>
        <tbody>${tradeRows}</tbody>
      </table>
    </div>`;

    drawEquityCurve(equity, trades);
  } catch (e) {
    resultDiv.innerHTML = `<span style="color:var(--red)">回测失败: ${e.message}</span>`;
  }
}

function drawEquityCurve(equity, trades) {
  const canvas = document.getElementById('equityCurve');
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.clientWidth * dpr;
  canvas.height = canvas.clientHeight * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const W = canvas.clientWidth, H = canvas.clientHeight;
  const pad = { top: 20, right: 20, bottom: 25, left: 55 };
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;

  const maxVal = Math.max(...equity, 0.001);
  const minVal = Math.min(...equity, -0.001);
  const range = maxVal - minVal || 0.01;

  const xStep = plotW / (equity.length - 1 || 1);
  const toY = v => pad.top + plotH - ((v - minVal) / range) * plotH;

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  const gridLines = 4;
  for (let i = 0; i <= gridLines; i++) {
    const y = pad.top + (plotH / gridLines) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    const val = maxVal - (range / gridLines) * i;
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '10px monospace';
    ctx.textAlign = 'right';
    ctx.fillText((val * 100).toFixed(1) + '%', pad.left - 5, y + 4);
  }

  // Zero line
  const zeroY = toY(0);
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.setLineDash([4, 3]);
  ctx.beginPath(); ctx.moveTo(pad.left, zeroY); ctx.lineTo(W - pad.right, zeroY); ctx.stroke();
  ctx.setLineDash([]);

  // Fill area
  ctx.beginPath();
  ctx.moveTo(pad.left, zeroY);
  for (let i = 0; i < equity.length; i++) {
    ctx.lineTo(pad.left + i * xStep, toY(equity[i]));
  }
  ctx.lineTo(pad.left + (equity.length - 1) * xStep, zeroY);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, pad.top, 0, H - pad.bottom);
  const finalPositive = equity[equity.length - 1] >= 0;
  grad.addColorStop(0, finalPositive ? 'rgba(63,185,80,0.25)' : 'rgba(248,81,73,0.15)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Main equity line
  ctx.beginPath();
  ctx.strokeStyle = finalPositive ? '#3fb950' : '#f85149';
  ctx.lineWidth = 2;
  for (let i = 0; i < equity.length; i++) {
    const x = pad.left + i * xStep, y = toY(equity[i]);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Trade markers
  trades.forEach(t => {
    const idx = t.exitIdx - 30;
    if (idx < 0 || idx >= equity.length) return;
    const x = pad.left + idx * xStep;
    const y = toY(equity[idx]);
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = t.pnl >= 0 ? '#3fb950' : '#f85149';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // End label
  const finalPnl = equity[equity.length - 1];
  ctx.fillStyle = finalPositive ? '#3fb950' : '#f85149';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'left';
  ctx.fillText((finalPnl * 100).toFixed(2) + '%', pad.left + (equity.length - 1) * xStep + 6, toY(finalPnl) + 4);
}

async function runOptimize() {
  const sym = document.getElementById('optSymbol').value.toUpperCase().replace(/USDT$/, '') + 'USDT';
  const interval = document.getElementById('btInterval').value;
  const bars = +document.getElementById('btBars').value;
  const metric = document.getElementById('optMetric').value;
  const progressEl = document.getElementById('optProgress');
  const resultDiv = document.getElementById('optimizeResult');
  resultDiv.innerHTML = '';
  progressEl.textContent = '获取数据...';

  const res = await fetch(`/api/klines?symbol=${sym}&interval=${interval}&limit=${bars}`);
  const klines = await res.json();
  if (!klines || klines.length < 50) { resultDiv.innerHTML = '<span style="color:var(--red)">数据不足</span>'; progressEl.textContent = ''; return; }

  const closes = klines.map(k => parseFloat(k[4]));
  const ma7 = calcMA(closes, 7), ma25 = calcMA(closes, 25);
  const rsi = calcRSI(closes, 14);
  const macd = calcMACD(closes);
  macd.histogram = macd.macd;

  // Generate weight combinations for key conditions (0,1,2,3 each)
  const condIds = currentStrategy.conditions.map(c => c.id);
  const weightOptions = [0, 1, 2, 3];
  const totalCombos = Math.pow(weightOptions.length, Math.min(condIds.length, 6));
  progressEl.textContent = `测试 ${totalCombos} 个组合...`;

  // Use sampling approach for large search space
  const maxIter = 500;
  const results = [];
  const originalWeights = currentStrategy.conditions.map(c => c.weight);

  for (let iter = 0; iter < maxIter; iter++) {
    // Randomize weights
    const testWeights = currentStrategy.conditions.map(() => weightOptions[Math.floor(Math.random() * weightOptions.length)]);
    currentStrategy.conditions.forEach((c, i) => c.weight = testWeights[i]);

    let trades = [], position = null;
    for (let i = 30; i < klines.length; i++) {
      const score = calcStrategyScore(i, closes, ma7, ma25, rsi, macd, klines);
      if (!position && score.long >= 3) position = { dir: 'long', entry: closes[i], entryIdx: i };
      else if (!position && score.short >= 3) position = { dir: 'short', entry: closes[i], entryIdx: i };
      else if (position) {
        const pnl = position.dir === 'long' ? (closes[i] / position.entry - 1) : (1 - closes[i] / position.entry);
        if (pnl <= -0.03 || pnl >= 0.05 || (position.dir === 'long' && score.short >= 3) || (position.dir === 'short' && score.long >= 3)) {
          trades.push({ pnl }); position = null;
        }
      }
    }

    if (trades.length < 2) continue;
    const totalPnl = trades.reduce((s, t) => s + t.pnl, 0);
    const winRate = trades.filter(t => t.pnl > 0).length / trades.length;
    const avgPnl = totalPnl / trades.length;
    const stdDev = Math.sqrt(trades.reduce((s, t) => s + (t.pnl - avgPnl) ** 2, 0) / trades.length);
    const sharpe = stdDev > 0 ? avgPnl / stdDev : 0;

    let score;
    if (metric === 'pnl') score = totalPnl;
    else if (metric === 'sharpe') score = sharpe;
    else score = winRate;

    results.push({ weights: [...testWeights], score, totalPnl, winRate, trades: trades.length, sharpe });

    if (iter % 50 === 0) progressEl.textContent = `${iter}/${maxIter} 已测试...`;
  }

  // Restore original weights
  currentStrategy.conditions.forEach((c, i) => c.weight = originalWeights[i]);

  results.sort((a, b) => b.score - a.score);
  const top5 = results.slice(0, 5);
  progressEl.textContent = `完成! 测试了 ${maxIter} 个组合`;

  const condLabels = currentStrategy.conditions.map(c => c.label.replace(/[（(].*/g, '').slice(0, 4));
  let html = `<div style="margin-top:10px;font-size:12px;color:var(--text2);margin-bottom:6px;">Top 5 参数组合（${sym} ${interval}）按${metric === 'pnl' ? '总收益' : metric === 'sharpe' ? '夏普比' : '胜率'}排序</div>`;
  html += `<table style="width:100%;font-size:10px;border-collapse:collapse;">
    <thead><tr style="color:var(--text2);border-bottom:1px solid var(--border);">
      <th style="padding:3px;">#</th><th>交易</th><th>胜率</th><th>收益</th><th>夏普</th>
      ${condLabels.map(l => `<th style="max-width:35px;overflow:hidden;">${l}</th>`).join('')}
      <th></th>
    </tr></thead><tbody>`;

  top5.forEach((r, i) => {
    const pnlC = r.totalPnl >= 0 ? 'var(--green)' : 'var(--red)';
    html += `<tr>
      <td style="padding:3px;">${i+1}</td>
      <td>${r.trades}</td>
      <td style="color:${r.winRate>=0.5?'var(--green)':'var(--red)'};">${(r.winRate*100).toFixed(0)}%</td>
      <td style="color:${pnlC};font-weight:600;">${(r.totalPnl*100).toFixed(1)}%</td>
      <td>${r.sharpe.toFixed(2)}</td>
      ${r.weights.map(w => `<td style="text-align:center;${w===0?'color:var(--text2);':''}">${w}</td>`).join('')}
      <td><button style="font-size:10px;padding:2px 6px;cursor:pointer;border:1px solid var(--green);color:var(--green);background:transparent;border-radius:3px;" onclick="applyOptWeights([${r.weights}])">应用</button></td>
    </tr>`;
  });
  html += '</tbody></table>';
  resultDiv.innerHTML = html;
}

function applyOptWeights(weights) {
  currentStrategy.conditions.forEach((c, i) => { if (i < weights.length) c.weight = weights[i]; });
  localStorage.setItem('userStrategy', JSON.stringify(currentStrategy));
  clearAllScanCache();
  document.getElementById('optimizeResult').innerHTML += '<div style="margin-top:6px;font-size:11px;color:var(--green);">✓ 已应用并保存</div>';
}

async function runBatchBacktest() {
  const input = document.getElementById('btMultiSymbols').value.trim();
  if (!input) { alert('请输入至少一个币种'); return; }
  const symbols = input.split(/[,，\s]+/).map(s => s.toUpperCase().replace(/USDT$/, '') + 'USDT');
  const interval = document.getElementById('btInterval').value;
  const bars = +document.getElementById('btBars').value;
  const resultDiv = document.getElementById('batchBacktestResult');
  resultDiv.innerHTML = '<span style="color:var(--text2)">批量回测中... 0/' + symbols.length + '</span>';

  const results = [];
  for (let si = 0; si < symbols.length; si++) {
    const sym = symbols[si];
    resultDiv.innerHTML = `<span style="color:var(--text2)">批量回测中... ${si+1}/${symbols.length} (${sym})</span>`;
    try {
      const res = await fetch(`/api/klines?symbol=${sym}&interval=${interval}&limit=${bars}`);
      const klines = await res.json();
      if (!klines || klines.length < 50) { results.push({ sym, error: '数据不足' }); continue; }

      const closes = klines.map(k => parseFloat(k[4]));
      const ma7 = calcMA(closes, 7), ma25 = calcMA(closes, 25);
      const rsi = calcRSI(closes, 14);
      const macd = calcMACD(closes);
      macd.histogram = macd.macd;

      let trades = [], position = null;
      for (let i = 30; i < klines.length; i++) {
        const score = calcStrategyScore(i, closes, ma7, ma25, rsi, macd, klines);
        if (!position && score.long >= 3) {
          position = { dir: 'long', entry: closes[i], entryIdx: i };
        } else if (!position && score.short >= 3) {
          position = { dir: 'short', entry: closes[i], entryIdx: i };
        } else if (position) {
          const pnl = position.dir === 'long' ? (closes[i] / position.entry - 1) : (1 - closes[i] / position.entry);
          if (pnl <= -0.03 || pnl >= 0.05 || (position.dir === 'long' && score.short >= 3) || (position.dir === 'short' && score.long >= 3)) {
            trades.push({ ...position, exit: closes[i], exitIdx: i, pnl });
            position = null;
          }
        }
      }

      const wins = trades.filter(t => t.pnl > 0).length;
      const totalPnl = trades.reduce((s, t) => s + t.pnl, 0);
      const maxDD = trades.reduce((dd, t) => Math.min(dd, t.pnl), 0);
      const avgPnl = trades.length ? totalPnl / trades.length : 0;
      results.push({ sym, trades: trades.length, winRate: trades.length ? wins / trades.length : 0, totalPnl, maxDD, avgPnl });
    } catch (e) {
      results.push({ sym, error: e.message });
    }
  }

  // Sort by totalPnl descending
  results.sort((a, b) => (b.totalPnl || -999) - (a.totalPnl || -999));

  const rows = results.map((r, i) => {
    if (r.error) return `<tr><td>${i+1}</td><td>${r.sym}</td><td colspan="5" style="color:var(--red);">${r.error}</td></tr>`;
    const pnlColor = r.totalPnl >= 0 ? 'var(--green)' : 'var(--red)';
    const wrColor = r.winRate >= 0.5 ? 'var(--green)' : 'var(--red)';
    return `<tr>
      <td>${i+1}</td><td style="font-weight:600;">${r.sym.replace('USDT','')}</td>
      <td>${r.trades}</td>
      <td style="color:${wrColor};">${(r.winRate*100).toFixed(1)}%</td>
      <td style="color:${pnlColor};font-weight:600;">${(r.totalPnl*100).toFixed(2)}%</td>
      <td style="color:var(--red);">${(r.maxDD*100).toFixed(2)}%</td>
      <td>${(r.avgPnl*100).toFixed(2)}%</td>
    </tr>`;
  }).join('');

  const totalAvgPnl = results.filter(r => !r.error).reduce((s, r) => s + (r.totalPnl || 0), 0) / (results.filter(r => !r.error).length || 1);

  resultDiv.innerHTML = `
    <div style="margin-top:12px;font-size:12px;color:var(--text2);margin-bottom:6px;">批量回测对比（${interval} / ${bars}根K线）· 平均收益 <span style="color:${totalAvgPnl>=0?'var(--green)':'var(--red)'};">${(totalAvgPnl*100).toFixed(2)}%</span></div>
    <table style="width:100%;font-size:11px;border-collapse:collapse;">
      <thead><tr style="color:var(--text2);border-bottom:1px solid var(--border);">
        <th style="padding:4px;">#</th><th>币种</th><th>交易数</th><th>胜率</th><th>总收益</th><th>最大回撤</th><th>均笔收益</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function calcStrategyScore(i, closes, ma7, ma25, rsi, macd, klines) {
  let long = 0, short = 0;
  const strat = currentStrategy.conditions;
  const findCond = id => strat.find(c => c.id === id);

  const maCross = findCond('ma_cross');
  if (maCross && maCross.value !== '忽略') {
    if (ma7[i] > ma25[i] && ma7[i-1] <= ma25[i-1]) long += maCross.weight;
    if (ma7[i] < ma25[i] && ma7[i-1] >= ma25[i-1]) short += maCross.weight;
  }

  const maTrend = findCond('ma_trend');
  if (maTrend && maTrend.value !== '忽略') {
    if (closes[i] > ma7[i] && ma7[i] > ma25[i]) long += maTrend.weight;
    if (closes[i] < ma7[i] && ma7[i] < ma25[i]) short += maTrend.weight;
  }

  // EMA crossover in backtest
  const emaCond = findCond('ema_fast_slow');
  if (emaCond && emaCond.value !== '忽略' && i >= 26) {
    const ema12 = calcEMA(closes.slice(0, i+1), 12);
    const ema26 = calcEMA(closes.slice(0, i+1), 26);
    const eL = ema12.length - 1, eP = eL - 1;
    if (ema12[eL] > ema26[eL] && ema12[eP] <= ema26[eP]) long += emaCond.weight;
    if (ema12[eL] < ema26[eL] && ema12[eP] >= ema26[eP]) short += emaCond.weight;
  }

  const rsiOB = findCond('rsi_ob');
  if (rsiOB && rsiOB.value !== '忽略' && rsi[i] > 70) short += rsiOB.weight;

  const rsiOS = findCond('rsi_os');
  if (rsiOS && rsiOS.value !== '忽略' && rsi[i] < 30) long += rsiOS.weight;

  const macdCross = findCond('macd_cross');
  if (macdCross && macdCross.value !== '忽略' && macd.histogram) {
    if (macd.histogram[i] > 0 && macd.histogram[i-1] <= 0) long += macdCross.weight;
    if (macd.histogram[i] < 0 && macd.histogram[i-1] >= 0) short += macdCross.weight;
  }

  // Bollinger Bands in backtest
  const bollCond = findCond('boll_band');
  if (bollCond && bollCond.value !== '忽略' && i >= 20) {
    const s20 = closes.slice(i-19, i+1);
    const m = s20.reduce((a,b) => a+b, 0) / 20;
    const sd = Math.sqrt(s20.reduce((s,v) => s+(v-m)**2, 0) / 20);
    if (closes[i] <= m - 2*sd) long += bollCond.weight;
    if (closes[i] >= m + 2*sd) short += bollCond.weight;
  }

  // Volume surge in backtest
  const volCond = findCond('vol_surge');
  if (volCond && volCond.value !== '忽略' && klines && i >= 20) {
    const vols = klines.map(k => k.volume || parseFloat(k[5] || 0));
    const avgV = vols.slice(i-19, i).reduce((a,b) => a+b, 0) / 19;
    if (vols[i] > avgV * 2) {
      if (closes[i] > closes[i-1]) long += volCond.weight;
      else short += volCond.weight;
    }
  }

  // Price action in backtest
  const paCond = findCond('price_action');
  if (paCond && paCond.value !== '忽略' && klines && i >= 1) {
    const lO = klines[i].open || parseFloat(klines[i][1] || 0);
    const lC = closes[i];
    const pO = klines[i-1].open || parseFloat(klines[i-1][1] || 0);
    const pC = closes[i-1];
    if (lC > lO && lC > pO && lO < pC) long += paCond.weight;
    if (lC < lO && lC < pO && lO > pC) short += paCond.weight;
  }

  return { long, short };
}

function calcPosPnl(pos, curPrice) {
  if (!curPrice) return 0;
  if (pos.direction === 'long') {
    return (curPrice - pos.entryPrice) * pos.qty;
  } else {
    return (pos.entryPrice - curPrice) * pos.qty;
  }
}

let _simPriceCache = {};

function calcUnrealizedPnl() {
  const sd = window._lastSmartData;
  if (sd && sd.price) _simPriceCache[symbol] = parseFloat(sd.price.price);
  return simState.positions.reduce((sum, pos) => {
    const price = _simPriceCache[pos.symbol] || 0;
    return sum + calcPosPnl(pos, price);
  }, 0);
}

function startSimTrading() {
  const cfg = simState.config;
  cfg.balance = parseFloat(document.getElementById('simBalance').value) || 10000;
  cfg.leverage = parseInt(document.getElementById('simLeverage').value) || 10;
  cfg.positionPct = parseFloat(document.getElementById('simPosPct').value) || 10;
  cfg.maxPositions = parseInt(document.getElementById('simMaxPos').value) || 3;
  cfg.scoreThreshold = parseInt(document.getElementById('simThreshold').value) || 4;
  cfg.stopLossPct = parseFloat(document.getElementById('simSL').value) || 2;
  cfg.takeProfitPct = parseFloat(document.getElementById('simTP').value) || 4;
  cfg.cooldownMin = parseInt(document.getElementById('simCooldown').value) || 5;
  cfg.notifyFeishu = document.getElementById('simNotifyFeishu')?.checked !== false;
  const wlInput = document.getElementById('simWatchlist').value.trim();
  cfg.watchlist = wlInput ? wlInput.split(/[,，\s]+/).map(s => s.toUpperCase().replace(/USDT$/, '') + 'USDT') : [];

  if (simState.totalTrades === 0 && simState.positions.length === 0) {
    simState.balance = cfg.balance;
    simState.initialBalance = cfg.balance;
  }

  simRunning = true;
  addSimLog('system', `启动自动交易 | 余额 $${simState.balance.toFixed(2)} | 杠杆 ${cfg.leverage}x | 阈值 ${cfg.scoreThreshold}`);
  saveSimState();
  renderSimDashPanel();
  runSimCycle();
}

function stopSimTrading() {
  simRunning = false;
  if (simTimer) { clearTimeout(simTimer); simTimer = null; }
  addSimLog('system', '停止自动交易');
  saveSimState();
  renderSimDashPanel();
}

function resetSimTrading() {
  if (!confirm('确认重置所有模拟交易数据？')) return;
  stopSimTrading();
  simState = {
    config: { ...defaultSimConfig },
    balance: defaultSimConfig.balance,
    initialBalance: defaultSimConfig.balance,
    positions: [],
    closedTrades: [],
    equityHistory: [],
    lastSignalTime: 0,
    totalTrades: 0,
    wins: 0,
  };
  localStorage.removeItem(SIM_LOG_KEY);
  saveSimState();
  renderSimDashPanel();
}

function manualCloseAll() {
  const sd = window._lastSmartData;
  const curPrice = sd ? parseFloat(sd.price.price) : 0;
  if (!curPrice || simState.positions.length === 0) return;
  [...simState.positions].forEach((_, i) => closePosition(0, curPrice, 'manual'));
  saveSimState();
  renderSimDashPanel();
}

function manualClosePos(idx) {
  const sd = window._lastSmartData;
  const curPrice = sd ? parseFloat(sd.price.price) : 0;
  if (!curPrice) return;
  closePosition(idx, curPrice, 'manual');
  saveSimState();
  renderSimDashPanel();
}

function closePosition(idx, price, reason) {
  const pos = simState.positions[idx];
  if (!pos) return;
  const pnl = calcPosPnl(pos, price);
  simState.balance += pos.margin + pnl;
  simState.totalTrades++;
  if (pnl > 0) simState.wins++;
  simState.closedTrades.push({
    ...pos,
    exitPrice: price,
    exitTime: Date.now(),
    pnl,
    reason,
  });
  if (simState.closedTrades.length > 500) simState.closedTrades = simState.closedTrades.slice(-500);
  simState.positions.splice(idx, 1);

  const reasonLabel = { tp: '止盈', sl: '止损', manual: '手动', signal: '反向信号' }[reason] || reason;
  const logMsg = `平仓 ${pos.direction === 'long' ? '多' : '空'} ${pos.symbol} @ $${price.toFixed(pos.entryPrice < 1 ? 6 : 2)} | ${reasonLabel} | PnL ${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}`;
  addSimLog(reason === 'tp' ? 'tp' : reason === 'sl' ? 'sl' : 'close', logMsg);

  notifySimTrade('平仓', `${pos.direction === 'long' ? '🟢多' : '🔴空'} ${pos.symbol}`,
    `价格: $${price.toFixed(pos.entryPrice < 1 ? 6 : 2)}\n原因: ${reasonLabel}\n盈亏: ${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}\n余额: $${simState.balance.toFixed(2)}`);
}

function openPosition(direction, price, sym) {
  const cfg = simState.config;
  const margin = simState.balance * (cfg.positionPct / 100);
  if (margin < 1 || margin > simState.balance) return;

  const qty = (margin * cfg.leverage) / price;
  const slDist = price * (cfg.stopLossPct / 100);
  const tpDist = price * (cfg.takeProfitPct / 100);

  const pos = {
    symbol: sym,
    direction,
    entryPrice: price,
    qty,
    margin,
    leverage: cfg.leverage,
    openTime: Date.now(),
    sl: direction === 'long' ? price - slDist : price + slDist,
    tp: direction === 'long' ? price + tpDist : price - tpDist,
    highWater: price,
  };

  simState.balance -= margin;
  simState.positions.push(pos);
  simState.lastSignalTime = Date.now();

  const dec = price < 1 ? 6 : 2;
  addSimLog('open', `开仓 ${direction === 'long' ? '做多' : '做空'} ${sym} @ $${price.toFixed(dec)} | 数量 ${qty.toFixed(4)} | 保证金 $${margin.toFixed(2)} | SL $${pos.sl.toFixed(dec)} TP $${pos.tp.toFixed(dec)}`);

  notifySimTrade('开仓', `${direction === 'long' ? '🟢做多' : '🔴做空'} ${sym}`,
    `价格: $${price.toFixed(dec)}\n数量: ${qty.toFixed(4)}\n杠杆: ${cfg.leverage}x\n保证金: $${margin.toFixed(2)}\n止损: $${pos.sl.toFixed(dec)}\n止盈: $${pos.tp.toFixed(dec)}`);
}

function notifySimTrade(action, title, detail) {
  const checkbox = document.getElementById('simNotifyFeishu');
  if (checkbox && !checkbox.checked) return;
  const fullTitle = `[模拟交易] ${action} ${title}`;
  const content = `**${action}通知**\n${detail}\n\n_${new Date().toLocaleString('zh-CN')}_`;
  try {
    fetch('/api/feishu-alert', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: fullTitle, content }),
    });
  } catch (e) { console.error('Sim notify error:', e); }
}

async function runSimCycle() {
  if (!simRunning) return;

  try {
    const watchlist = simState.config.watchlist && simState.config.watchlist.length > 0
      ? simState.config.watchlist
      : [symbol];

    // Process each coin in watchlist
    for (const sym of watchlist) {
      if (!simRunning) break;
      await processSimCoin(sym);
    }

    // Record equity
    const equity = simState.balance + calcUnrealizedPnl();
    simState.equityHistory.push({ time: Date.now(), equity });
    if (simState.equityHistory.length > 1000) simState.equityHistory = simState.equityHistory.slice(-1000);

    saveSimState();
    if (document.getElementById('simBody').style.display !== 'none') {
      renderSimDashPanel();
    }
  } catch (e) {
    console.error('SimCycle error:', e);
  }

  scheduleNext();
}

async function processSimCoin(sym) {
  let coinData, coinKlines;

  if (sym === symbol && window._lastSmartData) {
    coinData = window._lastSmartData;
    coinKlines = lastKlines;
  } else {
    try {
      const [dataRes, klineRes] = await Promise.all([
        fetch(`/api/data?symbol=${sym}&ratioLimit=24&oiLimit=12&takerLimit=24`),
        fetch(`/api/klines?symbol=${sym}&interval=${currentTF}&limit=100`),
      ]);
      coinData = await dataRes.json();
      if (coinData.error) return;
      const rawK = await klineRes.json();
      if (rawK.error) return;
      coinKlines = rawK.map(k => ({
        openTime: k[0], open: parseFloat(k[1]), high: parseFloat(k[2]),
        low: parseFloat(k[3]), close: parseFloat(k[4]), volume: parseFloat(k[5]),
      }));
    } catch (e) { return; }
  }

  if (!coinData || !coinData.price || !coinKlines || coinKlines.length < 30) return;

  const curPrice = parseFloat(coinData.price.price);
  if (!curPrice) return;
  _simPriceCache[sym] = curPrice;

  // Check TP/SL for existing positions of this coin
  for (let i = simState.positions.length - 1; i >= 0; i--) {
    const pos = simState.positions[i];
    if (pos.symbol !== sym) continue;

    if (pos.direction === 'long') {
      if (curPrice >= pos.tp) { closePosition(i, pos.tp, 'tp'); continue; }
      if (curPrice <= pos.sl) { closePosition(i, pos.sl, 'sl'); continue; }
      if (simState.config.trailingStop && curPrice > pos.highWater) {
        pos.highWater = curPrice;
        const newSL = curPrice * (1 - simState.config.trailingPct / 100);
        if (newSL > pos.sl) pos.sl = newSL;
      }
    } else {
      if (curPrice <= pos.tp) { closePosition(i, pos.tp, 'tp'); continue; }
      if (curPrice >= pos.sl) { closePosition(i, pos.sl, 'sl'); continue; }
      if (simState.config.trailingStop && curPrice < pos.highWater) {
        pos.highWater = curPrice;
        const newSL = curPrice * (1 + simState.config.trailingPct / 100);
        if (newSL < pos.sl) pos.sl = newSL;
      }
    }
  }

  // Check cooldown
  const elapsed = Date.now() - simState.lastSignalTime;
  const cooldownMs = simState.config.cooldownMin * 60 * 1000;
  if (elapsed < cooldownMs) return;

  // Check max positions (global)
  if (simState.positions.length >= simState.config.maxPositions) return;

  // Get strategy score
  const score = getSimSignal(coinData, coinKlines);
  const threshold = simState.config.scoreThreshold;
  const myPositions = simState.positions.filter(p => p.symbol === sym);

  if (score.long >= threshold && !myPositions.some(p => p.direction === 'long')) {
    if (myPositions.some(p => p.direction === 'short')) {
      const idx = simState.positions.findIndex(p => p.symbol === sym && p.direction === 'short');
      if (idx >= 0) closePosition(idx, curPrice, 'signal');
    }
    openPosition('long', curPrice, sym);
  } else if (score.short >= threshold && !myPositions.some(p => p.direction === 'short')) {
    if (myPositions.some(p => p.direction === 'long')) {
      const idx = simState.positions.findIndex(p => p.symbol === sym && p.direction === 'long');
      if (idx >= 0) closePosition(idx, curPrice, 'signal');
    }
    openPosition('short', curPrice, sym);
  }
}

function scheduleNext() {
  if (!simRunning) return;
  const coinCount = (simState.config.watchlist || []).length || 1;
  const delay = Math.max(10000, coinCount * 3000);
  simTimer = setTimeout(runSimCycle, delay);
}

function getSimSignal(data, klines) {
  if (!klines || klines.length < 30) return { long: 0, short: 0 };

  const closes = klines.map(k => k.close);
  const i = closes.length - 1;
  const ma7 = calcMA(closes, 7);
  const ma25 = calcMA(closes, 25);
  const rsi = calcRSI(closes, 14);
  const macdArr = calcMACD(closes);
  const macd = { dif: macdArr.map(m => m.dif), dea: macdArr.map(m => m.dea), histogram: macdArr.map(m => m.macd) };

  const baseScore = calcStrategyScore(i, closes, ma7, ma25, rsi, macd, klines);

  let longBoost = 0, shortBoost = 0;
  if (data.topPositions && data.topPositions.length >= 3) {
    const posArr = data.topPositions;
    const latR = parseFloat(posArr[posArr.length - 1].longShortRatio);
    const prev = posArr.slice(-3).map(d => parseFloat(d.longShortRatio));
    const trend = prev[2] - prev[0];
    if (latR > 1.1 && trend > 0.05) longBoost += 1;
    if (latR < 0.9 && trend < -0.05) shortBoost += 1;
  }
  if (data.takerVol && data.takerVol.length >= 3) {
    const tvArr = data.takerVol;
    const latBS = parseFloat(tvArr[tvArr.length - 1].buySellRatio);
    const prev = tvArr.slice(-3).map(d => parseFloat(d.buySellRatio));
    const trend = prev[2] - prev[0];
    if (latBS > 1.15 && trend > 0) longBoost += 1;
    if (latBS < 0.85 && trend < 0) shortBoost += 1;
  }
  if (data.fundingRate) {
    const fr = parseFloat(data.fundingRate.lastFundingRate);
    if (fr < -0.0005) longBoost += 1;
    if (fr > 0.001) shortBoost += 1;
  }

  return {
    long: baseScore.long + longBoost,
    short: baseScore.short + shortBoost,
  };
}

function fillSimWatchlist() {
  const top10 = (allTopSymbols || []).slice(0, 10).map(s => s.symbol ? s.symbol.replace('USDT', '') : s.replace('USDT', '')).join(',');
  document.getElementById('simWatchlist').value = top10 || 'BTC,ETH,SOL,BNB,XRP,DOGE,ADA,AVAX,DOT,LINK';
}

function renderSimLogPanel() {
  const el = document.getElementById('simLogPanel');
  const logs = loadSimLog().slice().reverse();
  if (logs.length === 0) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text2);font-size:12px;">暂无交易日志</div>';
    return;
  }
  el.innerHTML = `<div class="sim-log">${logs.map(l => {
    const t = new Date(l.time);
    const timeStr = `${t.getHours().toString().padStart(2, '0')}:${t.getMinutes().toString().padStart(2, '0')}`;
    const cls = l.type === 'open' ? 'log-open' : l.type === 'tp' ? 'log-tp' : l.type === 'sl' ? 'log-sl' : 'log-close';
    const typeLabel = { open: '开仓', close: '平仓', tp: '止盈', sl: '止损', system: '系统', manual: '手动' }[l.type] || l.type;
    return `<div class="sim-log-item ${cls}">
      <span class="log-time">${timeStr}</span>
      <span class="log-action">${typeLabel}</span>
      <span class="log-msg">${l.msg}</span>
    </div>`;
  }).join('')}</div>`;
}

function renderSimEquityPanel() {
  const el = document.getElementById('simEquityPanel');
  const hist = simState.equityHistory;
  if (hist.length < 2) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text2);font-size:12px;">数据不足，运行交易后可查看收益曲线</div>';
    return;
  }

  const closedPnl = simState.closedTrades.reduce((s, t) => s + t.pnl, 0);
  const maxEq = Math.max(...hist.map(h => h.equity));
  const minEq = Math.min(...hist.map(h => h.equity));
  const drawdown = ((maxEq - minEq) / maxEq * 100).toFixed(2);

  el.innerHTML = `
    <div style="display:flex;gap:16px;margin-bottom:8px;font-size:12px;">
      <span>已实现盈亏: <b style="color:${closedPnl >= 0 ? 'var(--green)' : 'var(--red)'};">${closedPnl >= 0 ? '+' : ''}$${closedPnl.toFixed(2)}</b></span>
      <span>最大回撤: <b style="color:var(--red);">${drawdown}%</b></span>
      <span>数据点: <b>${hist.length}</b></span>
    </div>
    <canvas class="sim-equity-canvas" id="simEquityCanvas"></canvas>
    ${simState.closedTrades.length > 0 ? `
    <div style="margin-top:12px;font-size:12px;color:var(--text2);">最近交易 (${simState.closedTrades.length}笔)</div>
    <div style="max-height:200px;overflow-y:auto;margin-top:6px;">
      <table style="font-size:11px;">
        <tr><th>时间</th><th>方向</th><th>开仓价</th><th>平仓价</th><th>盈亏</th><th>原因</th></tr>
        ${simState.closedTrades.slice().reverse().slice(0, 50).map(t => {
          const dec = t.entryPrice < 1 ? 6 : 2;
          const pnlColor = t.pnl >= 0 ? 'var(--green)' : 'var(--red)';
          const timeStr = new Date(t.exitTime).toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
          return `<tr>
            <td>${timeStr}</td>
            <td class="${t.direction === 'long' ? 'up' : 'down'}">${t.direction === 'long' ? '多' : '空'}</td>
            <td>$${t.entryPrice.toFixed(dec)}</td>
            <td>$${t.exitPrice.toFixed(dec)}</td>
            <td style="color:${pnlColor};">${t.pnl >= 0 ? '+' : ''}$${t.pnl.toFixed(2)}</td>
            <td>${{ tp: '止盈', sl: '止损', manual: '手动', signal: '反向' }[t.reason] || t.reason}</td>
          </tr>`;
        }).join('')}
      </table>
    </div>` : ''}
  `;

  requestAnimationFrame(() => drawSimEquityCurve());
}

function drawSimEquityCurve() {
  const canvas = document.getElementById('simEquityCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pad = { top: 10, right: 12, bottom: 20, left: 55 };
  const cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;

  const hist = simState.equityHistory;
  if (hist.length < 2) return;

  const values = hist.map(h => h.equity);
  const initBal = simState.initialBalance;
  let min = Math.min(...values, initBal) * 0.99;
  let max = Math.max(...values, initBal) * 1.01;
  const range = max - min || 1;

  ctx.clearRect(0, 0, W, H);

  ctx.strokeStyle = '#21262d'; ctx.lineWidth = 0.5;
  ctx.fillStyle = '#8b949e'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (ch / 4) * i;
    const val = max - range * (i / 4);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.fillText('$' + val.toFixed(0), pad.left - 4, y + 3);
  }

  // Initial balance line
  const initY = pad.top + ch * (1 - (initBal - min) / range);
  ctx.strokeStyle = '#484f58'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(pad.left, initY); ctx.lineTo(W - pad.right, initY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#8b949e'; ctx.font = '9px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('初始', W - pad.right + 2, initY + 3);

  // Equity line
  ctx.beginPath();
  values.forEach((v, i) => {
    const x = pad.left + (cw / (values.length - 1)) * i;
    const y = pad.top + ch * (1 - (v - min) / range);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  const lastV = values[values.length - 1];
  ctx.strokeStyle = lastV >= initBal ? '#3fb950' : '#f85149';
  ctx.lineWidth = 2; ctx.stroke();

  // Fill below line
  const lastIdx = values.length - 1;
  const lastX = pad.left + cw;
  const lastY = pad.top + ch * (1 - (lastV - min) / range);
  ctx.lineTo(lastX, pad.top + ch);
  ctx.lineTo(pad.left, pad.top + ch);
  ctx.closePath();
  ctx.fillStyle = lastV >= initBal ? 'rgba(63,185,80,0.08)' : 'rgba(248,81,73,0.08)';
  ctx.fill();

  // Endpoint
  ctx.fillStyle = lastV >= initBal ? '#3fb950' : '#f85149';
  ctx.beginPath(); ctx.arc(lastX, lastY, 4, 0, Math.PI * 2); ctx.fill();
  ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('$' + lastV.toFixed(0), lastX + 6, lastY + 3);
}
