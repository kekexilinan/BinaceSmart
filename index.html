<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聪明钱监控面板</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d;
    --text: #e6edf3; --text2: #8b949e; --green: #3fb950;
    --red: #f85149; --yellow: #d29922; --blue: #58a6ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', sans-serif; padding: 16px; }

  .header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .controls { display: flex; gap: 8px; align-items: center; }
  .controls input, .controls select {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 6px 12px; border-radius: 6px; font-size: 14px;
  }
  .controls button {
    background: var(--blue); color: #fff; border: none; padding: 6px 16px;
    border-radius: 6px; cursor: pointer; font-size: 14px;
  }
  .controls button:hover { opacity: 0.85; }
  .symbol-select-wrap { position: relative; }
  .symbol-select-wrap input { width: 120px; }
  .symbol-dropdown {
    position: absolute; top: 100%; left: 0; z-index: 1000;
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    max-height: 280px; overflow-y: auto; width: 220px; margin-top: 4px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4); display: none;
  }
  .symbol-dropdown.show { display: block; }
  .symbol-dropdown-item {
    padding: 7px 12px; font-size: 12px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    color: var(--text); transition: background 0.1s;
  }
  .symbol-dropdown-item:hover { background: rgba(88,166,255,0.12); }
  .symbol-dropdown-item .sym-name { font-weight: 500; }
  .symbol-dropdown-item .sym-vol { color: var(--text2); font-size: 10px; }
  .symbol-dropdown-item .sym-chg { font-size: 10px; }
  .symbol-dropdown-empty { padding: 12px; font-size: 12px; color: var(--text2); text-align: center; }
  .filter-bar {
    display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
    padding: 8px 12px; background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; flex-wrap: wrap;
  }
  .filter-tabs { display: flex; gap: 4px; }
  .filter-tab {
    background: var(--bg); border: 1px solid var(--border); color: var(--text2);
    padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500;
    transition: all 0.15s; position: relative;
  }
  .filter-tab:hover { border-color: var(--blue); color: var(--text); }
  .filter-tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .filter-tab .badge {
    position: absolute; top: -5px; right: -5px; background: var(--green); color: #fff;
    font-size: 9px; min-width: 14px; height: 14px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center; padding: 0 3px;
  }
  .filter-tab.loading::after {
    content: ''; display: inline-block; width: 10px; height: 10px; margin-left: 4px;
    border: 2px solid #fff3; border-top-color: #fff; border-radius: 50%;
    animation: spin 0.6s linear infinite; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .filter-sep { width: 1px; height: 16px; background: var(--border); margin: 0 4px; }
  .filter-group { display: flex; gap: 2px; align-items: center; }
  .filter-group-label { font-size: 10px; color: var(--text2); margin-right: 3px; white-space: nowrap; }
  .filter-pill {
    background: var(--bg); border: 1px solid var(--border); color: var(--text2);
    padding: 2px 7px; border-radius: 4px; cursor: pointer; font-size: 10px;
    transition: all 0.15s; white-space: nowrap;
  }
  .filter-pill:hover { border-color: var(--blue); color: var(--text); }
  .filter-pill.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .coin-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .coin-list-wrap {
    margin-bottom: 16px; position: relative;
  }
  .coin-list-wrap.collapsed .coin-tabs { max-height: 72px; overflow: hidden; }
  .coin-list-wrap .show-more-btn {
    display: none; margin-top: 6px; background: none; border: 1px solid var(--border);
    color: var(--text2); padding: 3px 12px; border-radius: 4px; cursor: pointer; font-size: 11px;
  }
  .coin-list-wrap .show-more-btn:hover { border-color: var(--blue); color: var(--text); }
  .coin-list-wrap.collapsed .show-more-btn { display: inline-block; }
  .coin-list-wrap.expanded .show-more-btn { display: inline-block; }

  .coin-tab { transition: all 0.12s; }
  .coin-tab:hover { border-color: var(--blue); color: var(--text); transform: translateY(-1px); }
  .coin-tab.active { box-shadow: 0 2px 8px rgba(88, 166, 255, 0.2); }

  @media (max-width: 768px) {
    body { padding: 10px; }
    .header { gap: 8px; margin-bottom: 8px; }
    .header h1 { font-size: 16px; }
    .filter-bar { padding: 6px 8px; gap: 6px; }
    .filter-group-label { display: none; }
    .filter-sep { height: 12px; }
    .filter-pill { padding: 2px 5px; font-size: 9px; }
    .filter-tab { padding: 4px 10px; font-size: 11px; }
    .coin-tab { padding: 3px 8px; font-size: 11px; }
    .coin-tabs { gap: 3px; }
    .controls input { width: 80px !important; }
    .overview { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .charts-grid { grid-template-columns: 1fr; }
    .kline-section { padding: 12px; }
    .signal-detail-card { padding: 12px; }
    .signal-detail-card .sd-signals { grid-template-columns: 1fr; }
  }
  @media (max-width: 480px) {
    .filter-bar { flex-direction: column; align-items: flex-start; }
    .filter-sep { width: 100%; height: 1px; margin: 4px 0; }
    .overview { grid-template-columns: repeat(2, 1fr); }
    .controls { flex-wrap: wrap; }
  }
  .coin-tab {
    background: var(--card); border: 1px solid var(--border); color: var(--text2);
    padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500;
    transition: all 0.15s;
  }
  .coin-tab:hover { border-color: var(--blue); color: var(--text); }
  .coin-tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .coin-tab .remove-btn {
    display: none; margin-left: 4px; font-size: 10px; cursor: pointer;
    color: var(--red); font-weight: 700;
  }
  .coin-tabs.editing .coin-tab .remove-btn { display: inline; }
  .coin-tabs.editing .coin-tab { padding-right: 6px; }
  .edit-toggle {
    background: none; border: 1px solid var(--border); color: var(--text2);
    padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 11px;
  }
  .edit-toggle:hover { border-color: var(--blue); color: var(--text); }
  .add-coin-wrap { position: relative; display: none; }
  .coin-tabs.editing ~ .add-coin-wrap { display: inline-flex; align-items: center; }
  .coin-search-input {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 4px 8px; border-radius: 6px; font-size: 12px; width: 120px;
  }
  .coin-search-input:focus { border-color: var(--blue); outline: none; }
  .coin-dropdown {
    position: absolute; top: 100%; left: 0; z-index: 999;
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    max-height: 240px; overflow-y: auto; width: 180px; margin-top: 4px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4); display: none;
  }
  .coin-dropdown.show { display: block; }
  .coin-dropdown-item {
    padding: 6px 10px; font-size: 12px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    color: var(--text);
  }
  .coin-dropdown-item:hover { background: rgba(88,166,255,0.1); }
  .coin-dropdown-item .vol { color: var(--text2); font-size: 10px; }
  .coin-dropdown-empty { padding: 10px; font-size: 12px; color: var(--text2); text-align: center; }
  .status { font-size: 13px; color: var(--text2); }
  .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
  .status .live { background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .overview { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; text-align: center;
  }
  .stat-card .label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .stat-card .value { font-size: 24px; font-weight: 700; }
  .stat-card .sub { font-size: 12px; color: var(--text2); margin-top: 4px; }

  .signals {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; margin-bottom: 20px;
  }
  .signals h3 { font-size: 15px; margin-bottom: 10px; color: var(--blue); }
  .signal-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 14px; }
  .signal-icon { font-size: 16px; width: 20px; text-align: center; }

  .kline-section {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; margin-bottom: 20px;
  }
  .kline-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .kline-header h3 { font-size: 15px; color: var(--blue); }
  .tf-tabs { display: flex; gap: 4px; }
  .tf-tab {
    background: var(--bg); border: 1px solid var(--border); color: var(--text2);
    padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
  }
  .tf-tab:hover { border-color: var(--blue); color: var(--text); }
  .tf-tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .kline-canvas-wrap { position: relative; }
  .kline-canvas-wrap canvas { width: 100% !important; }
  #c-kline { height: 320px !important; }
  #c-kline-overlay { height: 320px !important; position: absolute; top: 0; left: 0; pointer-events: none; }
  #c-rsi { height: 120px !important; }
  .kline-hover-area { position: relative; cursor: crosshair; }
  .kline-ohlc { font-size: 12px; color: var(--text2); min-height: 18px; margin-bottom: 2px; line-height: 1.6; }
  .kline-ohlc span { margin-right: 10px; white-space: nowrap; }
  .rsi-label { font-size: 12px; color: var(--text2); margin-top: 4px; }

  .chart-range-bar {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    padding: 6px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  }
  .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 16px; }
  .chart-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; overflow: hidden;
  }
  .chart-card h3 { font-size: 14px; margin-bottom: 12px; color: var(--text2); }
  .chart-card canvas { width: 100% !important; height: 220px !important; cursor: crosshair; }
  .chart-card { position: relative; }
  .chart-tooltip {
    position: fixed; z-index: 9999; pointer-events: none;
    background: rgba(22,27,34,0.95); border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; font-size: 11px; color: var(--text); line-height: 1.5;
    white-space: nowrap; display: none; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .chart-tooltip.show { display: block; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 6px 8px; color: var(--text2); font-weight: 500; border-bottom: 1px solid var(--border); }
  td { padding: 5px 8px; border-bottom: 1px solid var(--border); }
  .up { color: var(--green); } .down { color: var(--red); } .neutral { color: var(--yellow); }

  .signal-detail-card {
    background: var(--card); border: 1px solid var(--blue); border-radius: 10px;
    padding: 16px; margin-bottom: 16px; display: none;
    animation: fadeSlideDown 0.25s ease;
  }
  .signal-detail-card.show { display: block; }
  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .signal-detail-card .sd-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
  }
  .signal-detail-card .sd-header h3 { font-size: 16px; color: var(--blue); }
  .signal-detail-card .sd-close {
    background: none; border: none; color: var(--text2); font-size: 18px; cursor: pointer;
    padding: 2px 8px; border-radius: 4px;
  }
  .signal-detail-card .sd-close:hover { color: var(--text); background: var(--bg); }
  .signal-detail-card .sd-score {
    display: flex; align-items: center; gap: 6px; margin-bottom: 12px;
  }
  .signal-detail-card .sd-score-bar {
    flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden;
  }
  .signal-detail-card .sd-score-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .signal-detail-card .sd-signals { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; }
  .signal-detail-card .sd-signal-item {
    display: flex; align-items: center; gap: 6px; font-size: 13px; padding: 4px 0;
  }
  .signal-detail-card .sd-meta {
    display: flex; gap: 16px; margin-top: 12px; padding-top: 10px;
    border-top: 1px solid var(--border); font-size: 12px; color: var(--text2);
  }

  .alert-section {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; margin-bottom: 20px;
  }
  .alert-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .alert-header h3 { font-size: 15px; color: var(--blue); }
  .alert-form { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
  .alert-form select, .alert-form input {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 5px 10px; border-radius: 6px; font-size: 13px;
  }
  .alert-form input { width: 100px; }
  .alert-form button {
    background: var(--green); color: #fff; border: none; padding: 5px 14px;
    border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  .alert-list { max-height: 200px; overflow-y: auto; }
  .alert-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 8px; border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .alert-item:last-child { border-bottom: none; }
  .alert-item .desc { flex: 1; }
  .alert-item .triggered { color: var(--green); font-weight: 600; margin-right: 8px; }
  .alert-item .del-btn {
    background: none; border: none; color: var(--red); cursor: pointer;
    font-size: 14px; padding: 2px 6px;
  }
  .alert-toast {
    position: fixed; top: 20px; right: 20px; z-index: 999;
    background: var(--card); border: 2px solid var(--green); border-radius: 10px;
    padding: 14px 20px; color: var(--text); font-size: 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5); animation: slideIn 0.3s ease;
    display: none; max-width: 360px;
  }
  .alert-toast.show { display: block; }
  .alert-toast .toast-title { font-weight: 700; margin-bottom: 4px; color: var(--green); }
  @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
    <h1 id="title">聪明钱监控面板</h1>
  </div>
  <div class="controls">
    <div class="symbol-select-wrap" id="symbolSelectWrap">
      <input id="symbolInput" value="SLXUSDT" placeholder="搜索币种..." autocomplete="off"
        oninput="filterSymbolDropdown()" onfocus="openSymbolDropdown()" onblur="closeSymbolDropdown()" />
      <div class="symbol-dropdown" id="symbolDropdown"></div>
    </div>
    <select id="intervalSelect">
      <option value="30">30s</option>
      <option value="60" selected>60s</option>
      <option value="120">2min</option>
      <option value="300">5min</option>
    </select>
    <span class="status"><span class="dot live"></span><span id="countdown"></span></span>
  </div>
</div>

<div class="filter-bar" id="filterBar"></div>
<div class="coin-list-wrap collapsed" id="coinListWrap">
  <div class="coin-tabs" id="coinTabs"></div>
  <button class="show-more-btn" id="showMoreBtn" onclick="toggleCoinListExpand()">展开全部</button>
  <span class="add-coin-wrap" id="addCoinWrap" style="margin-left:8px;">
    <input class="coin-search-input" id="coinSearchInput" placeholder="搜索添加币种..." autocomplete="off"
      oninput="filterCoinDropdown()" onfocus="openCoinDropdown()" onblur="closeCoinDropdown()" />
    <div class="coin-dropdown" id="coinDropdown"></div>
  </span>
  <button class="edit-toggle" id="editToggle" onclick="toggleEdit()" style="margin-left:4px;">编辑</button>
</div>
<div class="signal-detail-card" id="signalDetailCard"></div>
<div class="overview" id="overview"></div>
<div class="signals" id="signals"></div>

<div class="kline-section">
  <div class="kline-header">
    <h3>价格走势 & RSI</h3>
    <div class="tf-tabs" id="tfTabs"></div>
  </div>
  <div class="kline-canvas-wrap">
    <div class="kline-ohlc" id="klineOHLC"></div>
    <div class="kline-hover-area" id="klineHoverArea">
      <canvas id="c-kline"></canvas>
      <canvas id="c-kline-overlay"></canvas>
    </div>
    <div class="rsi-label">RSI(6, 12, 24)</div>
    <canvas id="c-rsi"></canvas>
  </div>
</div>

<div class="chart-range-bar" id="chartRangeBar">
  <span class="filter-group-label">数据范围</span>
  <div class="filter-group" id="chartRangeGroup"></div>
</div>
<div class="charts-grid" id="charts"></div>

<div class="alert-section">
  <div class="alert-header">
    <h3>报警设置</h3>
    <span style="display:flex;gap:12px;">
      <label style="font-size:12px;color:var(--text2);cursor:pointer;">
        <input type="checkbox" id="alertSound" checked style="margin-right:4px;">声音
      </label>
      <label style="font-size:12px;color:var(--text2);cursor:pointer;">
        <input type="checkbox" id="alertFeishu" checked style="margin-right:4px;">飞书推送
      </label>
    </span>
  </div>
  <div class="alert-form">
    <select id="alertType">
      <option value="price_above">价格 ></option>
      <option value="price_below">价格 <</option>
      <option value="rsi_above">RSI6 ></option>
      <option value="rsi_below">RSI6 <</option>
      <option value="top_long">大户翻多 (比值>1)</option>
      <option value="top_short">大户翻空 (比值<1)</option>
      <option value="buy_surge">主动买入激增 (>1.2)</option>
      <option value="sell_surge">主动卖出激增 (<0.8)</option>
    </select>
    <input id="alertValue" type="number" step="any" placeholder="阈值">
    <button onclick="addAlert()">添加报警</button>
  </div>
  <div class="alert-list" id="alertList"></div>
</div>

<div class="chart-tooltip" id="chartTooltip"></div>
<div id="alertToast" class="alert-toast">
  <div class="toast-title" id="toastTitle"></div>
  <div id="toastBody"></div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
let symbol = urlParams.get('symbol')?.toUpperCase() || 'SLXUSDT';
let interval = parseInt(urlParams.get('interval') || '60', 10);
let timer = null;
let remaining = 0;

const defaultCoins = [
  { symbol: 'VELVETUSDT', label: 'VELVET' },
  { symbol: 'SLXUSDT', label: 'SLX' },
  { symbol: 'SKYAIUSDT', label: 'SKYAI' },
  { symbol: 'RAVEUSDT', label: 'RAVE' },
  { symbol: 'ESPORTSUSDT', label: 'ESPORTS' },
  { symbol: 'PLAYUSDT', label: 'PLAY' },
  { symbol: 'BEATUSDT', label: 'BEAT' },
  { symbol: 'BTCUSDT', label: 'BTC' },
];

function loadCoins() {
  try {
    const saved = localStorage.getItem('smart-money-coins');
    if (saved) return JSON.parse(saved);
  } catch {}
  return [...defaultCoins];
}
function saveCoins() { localStorage.setItem('smart-money-coins', JSON.stringify(presetCoins)); }
let presetCoins = loadCoins();
let editing = false;

function escAttr(s) { return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

// Right-side trading filter
function loadFilterSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('smart-money-filter-settings'));
    return s || {};
  } catch { return {}; }
}
function saveFilterSettings() {
  localStorage.setItem('smart-money-filter-settings', JSON.stringify({ filterTF, scanTopLimit, activeFilter, sortBy }));
}
const savedFilterSettings = loadFilterSettings();
let activeFilter = savedFilterSettings.activeFilter || 'all';
let rightSideCoins = new Set();
let rightSideLoading = false;
let rightSideCache = {};
let filterTF = savedFilterSettings.filterTF || '1h';
const FILTER_TF_OPTIONS = [
  { value: '1h', label: '1H' },
  { value: '4h', label: '4H' },
  { value: '1d', label: '1D' },
];
const SCAN_RANGE_OPTIONS = [
  { value: 50, label: 'Top50' },
  { value: 100, label: 'Top100' },
  { value: 200, label: 'Top200' },
  { value: 500, label: 'Top500' },
];
const SORT_OPTIONS = [
  { value: 'score', label: '评分↓' },
  { value: 'change', label: '涨幅↓' },
  { value: 'volume', label: '成交量↓' },
];
let sortBy = savedFilterSettings.sortBy || 'score';

const CHART_RANGE_OPTIONS = [

const ALERT_LABELS = {
  price_above: '价格 >',  price_below: '价格 <',
  rsi_above: 'RSI6 >',    rsi_below: 'RSI6 <',
  top_long: '大户翻多',   top_short: '大户翻空',
  buy_surge: '买入激增',  sell_surge: '卖出激增',
};
const NO_VALUE_TYPES = ['top_long', 'top_short', 'buy_surge', 'sell_surge'];

function addAlert() {
  const type = document.getElementById('alertType').value;
  const value = parseFloat(document.getElementById('alertValue').value);
  if (!NO_VALUE_TYPES.includes(type) && isNaN(value)) return;
  alerts.push({
    id: alertIdCounter++, type, value: NO_VALUE_TYPES.includes(type) ? null : value,
    symbol, triggered: false, createdAt: Date.now(),
  });
  saveAlerts();
  document.getElementById('alertValue').value = '';
  renderAlerts();
}

function removeAlert(id) {
  alerts = alerts.filter(a => a.id !== id);
  saveAlerts();
  renderAlerts();
}

function renderAlerts() {
  const el = document.getElementById('alertList');
  if (!alerts.length) { el.innerHTML = '<div style="color:var(--text2);font-size:12px;padding:6px 0;">暂无报警</div>'; return; }
  el.innerHTML = alerts.map(a => {
    const label = ALERT_LABELS[a.type] || a.type;
    const valStr = a.value !== null ? ` ${a.value}` : '';
    return `<div class="alert-item">
      <span class="desc">[${a.symbol}] ${label}${valStr}</span>
      ${a.triggered ? '<span class="triggered">已触发</span>' : ''}
      <button class="del-btn" onclick="removeAlert(${a.id})">✕</button>
    </div>`;
  }).join('');
}

function playAlertSound() {
  if (!document.getElementById('alertSound').checked) return;
  try {
    const actx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.connect(gain); gain.connect(actx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.5);
    osc.start(); osc.stop(actx.currentTime + 0.5);
  } catch {}
}

  document.getElementById('toastTitle').textContent = title;

function formatNum(n) {
  if (n >= 1e8) return (n / 1e8).toFixed(2) + '亿';
  if (n >= 1e4) return (n / 1e4).toFixed(2) + '万';
  return n.toFixed(0);
}
function formatUSDT(n) {
  if (n >= 1e8) return '$' + (n / 1e8).toFixed(2) + '亿';
  if (n >= 1e4) return '$' + (n / 1e4).toFixed(2) + '万';
  return '$' + n.toFixed(2);
}
function ts2time(ts) {
  const d = new Date(ts);
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const hh = String(d.getHours()).padStart(2, '0');
  const mi = String(d.getMinutes()).padStart(2, '0');
  return `${mm}-${dd} ${hh}:${mi}`;
}
function ratioClass(r) {
  r = parseFloat(r);
  if (r >= 1.0) return 'up';
  if (r >= 0.9) return 'neutral';
  return 'down';
}

function drawLineChart(canvas, labels, datasets) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pad = { top: 10, right: 12, bottom: 28, left: 48 };
  const cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;

  let allVals = datasets.flatMap(d => d.data);
  let min = Math.min(...allVals), max = Math.max(...allVals);
  const range = max - min || 1;
  min -= range * 0.05; max += range * 0.05;

  ctx.clearRect(0, 0, W, H);

  // grid
  ctx.strokeStyle = '#21262d'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (ch / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.fillStyle = '#8b949e'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText((max - (max - min) * (i / 4)).toFixed(4), pad.left - 4, y + 3);
  }

  // reference line at 1.0 if in range
  if (min < 1 && max > 1) {
    const y1 = pad.top + ch * (1 - (1 - min) / (max - min));
    ctx.strokeStyle = '#484f58'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(pad.left, y1); ctx.lineTo(W - pad.right, y1); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#8b949e'; ctx.font = '10px sans-serif';
    ctx.fillText('1.0', pad.left - 4, y1 + 3);
  }

  // x labels
  ctx.fillStyle = '#8b949e'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
  const step = Math.max(1, Math.floor(labels.length / 6));
  for (let i = 0; i < labels.length; i += step) {
    const x = pad.left + (cw / (labels.length - 1)) * i;
    ctx.fillText(labels[i], x, H - 6);
  }

  // lines
  const colors = ['#58a6ff', '#3fb950', '#f85149', '#d29922'];
  datasets.forEach((ds, di) => {
    ctx.strokeStyle = colors[di % colors.length]; ctx.lineWidth = 2;
    ctx.beginPath();
    ds.data.forEach((v, i) => {
      const x = pad.left + (cw / (ds.data.length - 1)) * i;
      const y = pad.top + ch * (1 - (v - min) / (max - min));
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();

    // dot on last point
    const lastX = pad.left + cw;
    const lastY = pad.top + ch * (1 - (ds.data[ds.data.length - 1] - min) / (max - min));
    ctx.fillStyle = colors[di % colors.length];
    ctx.beginPath(); ctx.arc(lastX, lastY, 4, 0, Math.PI * 2); ctx.fill();
  });

  // legend
  if (datasets.length > 1) {
    ctx.font = '11px sans-serif';
    let lx = pad.left + 4;
    datasets.forEach((ds, di) => {
      ctx.fillStyle = colors[di % colors.length];
      ctx.fillRect(lx, pad.top + 2, 12, 3);
      ctx.fillStyle = '#e6edf3';
      ctx.textAlign = 'left';
      ctx.fillText(ds.label, lx + 16, pad.top + 8);
      lx += ctx.measureText(ds.label).width + 32;
    });
  }

  setupChartHover(canvas, labels, datasets, pad, cw, ch, min, max);
}

function setupChartHover(canvas, labels, datasets, pad, cw, ch, min, max) {
  const tooltip = document.getElementById('chartTooltip');
  const colors = ['#58a6ff', '#3fb950', '#f85149', '#d29922'];
  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    if (mx < pad.left || mx > pad.left + cw) { tooltip.classList.remove('show'); return; }
    const ratio = (mx - pad.left) / cw;
    const idx = Math.round(ratio * (labels.length - 1));
    if (idx < 0 || idx >= labels.length) { tooltip.classList.remove('show'); return; }
    let html = `<div style="margin-bottom:3px;font-weight:500;">${labels[idx]}</div>`;
    datasets.forEach((ds, di) => {
      const v = ds.data[idx];
      if (v != null) html += `<div style="color:${colors[di % colors.length]}">${ds.label}: ${v.toFixed(4)}</div>`;
    });
    tooltip.innerHTML = html;
    tooltip.classList.add('show');
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  };
  canvas.onmouseleave = () => { tooltip.classList.remove('show'); };
}

function drawBarChart(canvas, labels, buyData, sellData) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pad = { top: 10, right: 12, bottom: 28, left: 48 };
  const cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;

  const allVals = [...buyData, ...sellData];
  const max = Math.max(...allVals) * 1.1;

  ctx.clearRect(0, 0, W, H);

  const barW = (cw / labels.length) * 0.35;
  const gap = cw / labels.length;

  // grid
  ctx.strokeStyle = '#21262d'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (ch / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.fillStyle = '#8b949e'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(formatNum(max - (max / 4) * i), pad.left - 4, y + 3);
  }

  labels.forEach((l, i) => {
    const cx = pad.left + gap * i + gap / 2;
    const bh = (buyData[i] / max) * ch;
    const sh = (sellData[i] / max) * ch;
    ctx.fillStyle = '#3fb95080';
    ctx.fillRect(cx - barW - 1, pad.top + ch - bh, barW, bh);
    ctx.fillStyle = '#f8514980';
    ctx.fillRect(cx + 1, pad.top + ch - sh, barW, sh);

    if (i % Math.max(1, Math.floor(labels.length / 6)) === 0) {
      ctx.fillStyle = '#8b949e'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(l, cx, H - 6);
    }
  });

  // legend
  ctx.font = '11px sans-serif';
  ctx.fillStyle = '#3fb950'; ctx.fillRect(pad.left + 4, pad.top + 2, 12, 3);
  ctx.fillStyle = '#e6edf3'; ctx.textAlign = 'left'; ctx.fillText('买入', pad.left + 20, pad.top + 8);
  ctx.fillStyle = '#f85149'; ctx.fillRect(pad.left + 56, pad.top + 2, 12, 3);
  ctx.fillStyle = '#e6edf3'; ctx.fillText('卖出', pad.left + 72, pad.top + 8);

  setupChartHover(canvas, labels, [
    { label: '买入', data: buyData },
    { label: '卖出', data: sellData }
  ], pad, cw, ch, 0, max);
}

function calcRSI(closes, period = 14) {
  const rsi = new Array(closes.length).fill(null);
  if (closes.length < period + 1) return rsi;
  let gainSum = 0, lossSum = 0;
  for (let i = 1; i <= period; i++) {
    const d = closes[i] - closes[i - 1];
    if (d > 0) gainSum += d; else lossSum -= d;
  }
  let avgGain = gainSum / period, avgLoss = lossSum / period;
  rsi[period] = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);
  for (let i = period + 1; i < closes.length; i++) {
    const d = closes[i] - closes[i - 1];
    avgGain = (avgGain * (period - 1) + Math.max(d, 0)) / period;
    avgLoss = (avgLoss * (period - 1) + Math.max(-d, 0)) / period;
    rsi[i] = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);
  }
  return rsi;
}

function ts2klineLabel(ts, tf) {
  const d = new Date(ts);
  if (tf === '1d') return `${d.getMonth()+1}/${d.getDate()}`;
  if (tf === '4h') return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:00`;
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function calcMA(closes, period) {
  const ma = new Array(closes.length).fill(null);
  for (let i = period - 1; i < closes.length; i++) {
    let sum = 0;
    for (let j = i - period + 1; j <= i; j++) sum += closes[j];
    ma[i] = sum / period;
  }
  return ma;
}

function drawCandlestick(canvas, klines, tf) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pad = { top: 12, right: 60, bottom: 28, left: 10 };
  const cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;

  const highs = klines.map(k => k.high);
  const lows = klines.map(k => k.low);
  let pMin = Math.min(...lows), pMax = Math.max(...highs);
  const pRange = pMax - pMin || 1;
  pMin -= pRange * 0.02; pMax += pRange * 0.02;

  ctx.clearRect(0, 0, W, H);

  const candleW = Math.max(2, (cw / klines.length) * 0.65);
  const gap = cw / klines.length;

  const priceToY = (p) => pad.top + ch * (1 - (p - pMin) / (pMax - pMin));

  // grid
  ctx.strokeStyle = '#21262d'; ctx.lineWidth = 0.5;
  ctx.fillStyle = '#8b949e'; ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
  for (let i = 0; i <= 5; i++) {
    const price = pMin + (pMax - pMin) * (1 - i / 5);
    const y = pad.top + (ch / 5) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    const decimals = price < 1 ? 6 : price < 100 ? 4 : 2;
    ctx.fillText(price.toFixed(decimals), W - pad.right + 4, y + 3);
  }

  // x labels
  ctx.fillStyle = '#8b949e'; ctx.textAlign = 'center';
  const labelStep = Math.max(1, Math.floor(klines.length / 8));
  for (let i = 0; i < klines.length; i += labelStep) {
    const x = pad.left + gap * i + gap / 2;
    ctx.fillText(ts2klineLabel(klines[i].openTime, tf), x, H - 6);
  }

  // volume bars (rendered first so candles draw on top)
  const volumes = klines.map(k => k.volume);
  const maxVol = Math.max(...volumes);
  const volHeight = ch * 0.2;
  klines.forEach((k, i) => {
    const cx = pad.left + gap * i + gap / 2;
    const isUp = k.close >= k.open;
    const vh = (k.volume / maxVol) * volHeight;
    ctx.fillStyle = isUp ? '#3fb95030' : '#f8514930';
    ctx.fillRect(cx - candleW / 2, pad.top + ch - vh, candleW, vh);
  });

  // candles
  klines.forEach((k, i) => {
    const cx = pad.left + gap * i + gap / 2;
    const isUp = k.close >= k.open;
    const color = isUp ? '#3fb950' : '#f85149';

    // wick
    ctx.strokeStyle = color; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx, priceToY(k.high));
    ctx.lineTo(cx, priceToY(k.low));
    ctx.stroke();

    // body
    const bodyTop = priceToY(Math.max(k.open, k.close));
    const bodyBot = priceToY(Math.min(k.open, k.close));
    const bodyH = Math.max(1, bodyBot - bodyTop);
    if (isUp) {
      ctx.strokeStyle = color; ctx.lineWidth = 1;
      ctx.strokeRect(cx - candleW / 2, bodyTop, candleW, bodyH);
    } else {
      ctx.fillStyle = color;
      ctx.fillRect(cx - candleW / 2, bodyTop, candleW, bodyH);
    }
  });

  // MA lines
  const closes = klines.map(k => k.close);
  const maConfigs = [
    { period: 5, color: '#d29922', label: 'MA5' },
    { period: 20, color: '#58a6ff', label: 'MA20' },
    { period: 60, color: '#bc8cff', label: 'MA60' },
  ];
  maConfigs.forEach(({ period, color, label }) => {
    if (klines.length < period) return;
    const ma = calcMA(closes, period);
    ctx.strokeStyle = color; ctx.lineWidth = 1.2;
    ctx.beginPath();
    let started = false;
    ma.forEach((v, i) => {
      if (v === null) return;
      const x = pad.left + gap * i + gap / 2;
      const y = priceToY(v);
      if (!started) { ctx.moveTo(x, y); started = true; }
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
  });

  // MA legend
  ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
  let legendX = pad.left + 4;
  maConfigs.forEach(({ period, color, label }) => {
    if (klines.length < period) return;
    const ma = calcMA(closes, period);
    const lastVal = ma.filter(v => v !== null).pop();
    if (!lastVal) return;
    const dec = lastVal < 1 ? 6 : lastVal < 100 ? 4 : 2;
    ctx.fillStyle = color;
    ctx.fillRect(legendX, pad.top + 2, 10, 3);
    ctx.fillText(`${label}: ${lastVal.toFixed(dec)}`, legendX + 14, pad.top + 8);
    legendX += ctx.measureText(`${label}: ${lastVal.toFixed(dec)}`).width + 24;
  });

  // latest price line
  const lastPrice = klines[klines.length - 1].close;
  const lastY = priceToY(lastPrice);
  const lastColor = klines[klines.length - 1].close >= klines[klines.length - 1].open ? '#3fb950' : '#f85149';
  ctx.strokeStyle = lastColor; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
  ctx.beginPath(); ctx.moveTo(pad.left, lastY); ctx.lineTo(W - pad.right, lastY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = lastColor;
  const decimals = lastPrice < 1 ? 6 : lastPrice < 100 ? 4 : 2;
  ctx.fillRect(W - pad.right, lastY - 8, 56, 16);
  ctx.fillStyle = '#fff'; ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(lastPrice.toFixed(decimals), W - pad.right + 4, lastY + 3);
}

function drawRSIChart(canvas, rsiLines, klines, tf) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pad = { top: 8, right: 60, bottom: 28, left: 10 };
  const cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;
  const dataLen = klines.length;
  const gap = cw / dataLen;

  ctx.clearRect(0, 0, W, H);

  const yToCanvas = (v) => pad.top + ch * (1 - v / 100);

  // overbought / oversold zones
  ctx.fillStyle = '#f8514910';
  ctx.fillRect(pad.left, yToCanvas(100), cw, yToCanvas(70) - yToCanvas(100));
  ctx.fillStyle = '#3fb95010';
  ctx.fillRect(pad.left, yToCanvas(30), cw, yToCanvas(0) - yToCanvas(30));

  // grid lines at 20, 50, 80
  [20, 50, 80].forEach(v => {
    const y = yToCanvas(v);
    ctx.strokeStyle = v === 50 ? '#484f58' : '#30363d';
    ctx.lineWidth = 1; ctx.setLineDash(v === 50 ? [4, 4] : [2, 4]);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#8b949e'; ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(v.toString(), W - pad.right + 4, y + 3);
  });

  // x labels
  ctx.fillStyle = '#8b949e'; ctx.textAlign = 'center';
  const labelStep = Math.max(1, Math.floor(dataLen / 8));
  for (let i = 0; i < dataLen; i += labelStep) {
    const x = pad.left + gap * i + gap / 2;
    ctx.fillText(ts2klineLabel(klines[i].openTime, tf), x, H - 6);
  }

  // draw each RSI line
  rsiLines.forEach(({ period, color, data }) => {
    ctx.strokeStyle = color; ctx.lineWidth = 1.2;
    ctx.beginPath();
    let started = false;
    data.forEach((v, i) => {
      if (v === null) return;
      const x = pad.left + gap * i + gap / 2;
      const y = yToCanvas(v);
      if (!started) { ctx.moveTo(x, y); started = true; }
      else ctx.lineTo(x, y);
    });
    ctx.stroke();

    // dot on last point
    const lastVal = data[data.length - 1];
    if (lastVal !== null) {
      const lx = pad.left + gap * (data.length - 1) + gap / 2;
      const ly = yToCanvas(lastVal);
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(lx, ly, 3, 0, Math.PI * 2); ctx.fill();
    }
  });

  // legend with current values
  ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
  let legendX = pad.left + 4;
  rsiLines.forEach(({ period, color, data }) => {
    const lastVal = data.filter(v => v !== null).pop();
    if (!lastVal) return;
    const label = `RSI${period}: ${lastVal.toFixed(1)}`;
    ctx.fillStyle = color;
    ctx.fillRect(legendX, pad.top + 1, 10, 3);
    ctx.fillText(label, legendX + 14, pad.top + 7);
    legendX += ctx.measureText(label).width + 24;
  });
}

async function fetchAndDrawKlines() {
  try {
    const res = await fetch(`/api/klines?symbol=${symbol}&interval=${currentTF}&limit=100`);
    const raw = await res.json();
    if (raw.error) return;
    const klines = raw.map(k => ({
      openTime: k[0], open: parseFloat(k[1]), high: parseFloat(k[2]),
      low: parseFloat(k[3]), close: parseFloat(k[4]), volume: parseFloat(k[5]),
    }));
    const closes = klines.map(k => k.close);
    const rsiLines = [
      { period: 6, color: '#d29922', data: calcRSI(closes, 6) },
      { period: 12, color: '#58a6ff', data: calcRSI(closes, 12) },
      { period: 24, color: '#bc8cff', data: calcRSI(closes, 24) },
    ];

    lastKlines = klines;
    checkRSIAlerts(rsiLines[0].data);
    requestAnimationFrame(() => {
      drawCandlestick(document.getElementById('c-kline'), klines, currentTF);
      drawRSIChart(document.getElementById('c-rsi'), rsiLines, klines, currentTF);
      setupOverlay();
    });
  } catch (e) {
    console.error('Kline fetch error:', e);
  }
}

async function fetchData() {

function startCountdown() {
  remaining = interval;
  if (timer) clearInterval(timer);
  timer = setInterval(() => {
    remaining--;
    document.getElementById('countdown').textContent = `${remaining}s 后刷新`;
    if (remaining <= 0) {
      remaining = interval;
      fetchData();
    }
  }, 1000);
}

      return `<div class="symbol-dropdown-item" onmousedown="selectSymbolFromDropdown('${s.symbol}')">

function changeSymbol(newSymbol) {
  if (newSymbol) {
    symbol = newSymbol;
    document.getElementById('symbolInput').value = symbol;
  } else {
    symbol = document.getElementById('symbolInput').value.toUpperCase().trim();
  }
  interval = parseInt(document.getElementById('intervalSelect').value, 10);
  const url = new URL(window.location);
  url.searchParams.set('symbol', symbol);
  url.searchParams.set('interval', interval);
  history.replaceState(null, '', url);
  renderCoinTabs();
  fetchData();
  startCountdown();
}

function showSignalDetail(sym) {
  const data = rightSideResults.find(r => r.symbol === sym) || leftSideResults.find(r => r.symbol === sym) || rightSideCache[sym] || leftSideCache[sym];
  if (!data) return;
  const card = document.getElementById('signalDetailCard');
  const label = data.label || sym.replace('USDT', '');
  const isLeft = data.isLeftSide !== undefined;
  const cardTitle = isLeft ? `${label} 左侧信号分析` : `${label} 右侧信号分析`;
  const maxScore = isLeft ? 6 : 5;
  const s = data.score || 0;
  const pct = (s / maxScore) * 100;
  const barColor = s >= maxScore ? 'var(--green)' : s >= maxScore - 1 ? '#3fb950cc' : s >= 3 ? 'var(--yellow)' : 'var(--red)';
  const chg = data.change;
  const chgStr = chg !== undefined ? `<span style="color:${chg >= 0 ? 'var(--green)' : 'var(--red)'};">${chg >= 0 ? '+' : ''}${chg.toFixed(2)}%</span>` : '';

  const signals = (data.signals || []).map(sig => {
    let icon = '─', color = 'var(--text2)';
    if (sig.startsWith('✓')) { icon = '✓'; color = 'var(--green)'; }
    else if (sig.startsWith('✗')) { icon = '✗'; color = 'var(--red)'; }
    else if (sig.startsWith('⚠')) { icon = '⚠'; color = 'var(--yellow)'; }
    else if (sig.startsWith('◐')) { icon = '◐'; color = 'var(--yellow)'; }
    return `<div class="sd-signal-item"><span style="color:${color};font-weight:700;width:16px;">${icon}</span><span>${sig.slice(2)}</span></div>`;
  }).join('');

  card.innerHTML = `
    <div class="sd-header">
      <h3>${cardTitle}</h3>
      <button class="sd-close" onclick="closeSignalDetail()">✕</button>
    </div>
    <div class="sd-score">
      <span style="font-weight:700;font-size:18px;color:${barColor};">${s}/${maxScore}</span>
      <div class="sd-score-bar"><div class="sd-score-fill" style="width:${pct}%;background:${barColor};"></div></div>
      <span style="font-size:12px;color:var(--text2);">${isLeft ? (s >= 5 ? '深度超跌' : s >= 3 ? '左侧机会' : '信号不足') : (s >= 4 ? '强势右侧' : s >= 3 ? '右侧确认' : '信号不足')}</span>
    </div>
    <div class="sd-signals">${signals}</div>
    <div class="sd-meta">
      <span>24h: ${chgStr}</span>
      <span>周期: ${filterTF}</span>
      <span>扫描时间: ${new Date(data.ts).toLocaleTimeString('zh-CN', { hour12: false })}</span>
    </div>
  `;
  card.classList.add('show');
}

function calcMACD(closes) {
  const ema = (data, period) => {
    const k = 2 / (period + 1);
    const result = [data[0]];
    for (let i = 1; i < data.length; i++) {
      result.push(data[i] * k + result[i - 1] * (1 - k));
    }
    return result;
  };
  const ema12 = ema(closes, 12);
  const ema26 = ema(closes, 26);
  const dif = ema12.map((v, i) => v - ema26[i]);
  const dea = ema(dif, 9);
  return { dif, dea, macd: dif.map((v, i) => (v - dea[i]) * 2) };
}

async function checkCoinRightSide(sym) {
  const cached = rightSideCache[sym];
  if (cached && Date.now() - cached.ts < 5 * 60 * 1000) return cached;
  try {
    const res = await fetch(`/api/klines?symbol=${sym}&interval=${filterTF}&limit=100`);
    const raw = await res.json();
    if (raw.error || !Array.isArray(raw) || raw.length < 30) {
      return { ts: Date.now(), isRightSide: false, score: 0, signals: [], detail: '数据不足' };
    }
    const closes = raw.map(k => parseFloat(k[4]));
    const volumes = raw.map(k => parseFloat(k[5]));
    const lastPrice = closes[closes.length - 1];

    const signals = [];
    let score = 0;

    // 1. MA trend: price > MA20 && MA5 > MA20
    const ma5 = calcMA(closes, 5);
    const ma20 = calcMA(closes, 20);
    const lastMA5 = ma5[ma5.length - 1];
    const lastMA20 = ma20[ma20.length - 1];
    if (lastMA5 !== null && lastMA20 !== null) {
      const priceAboveMA20 = lastPrice > lastMA20;
      const ma5AboveMA20 = lastMA5 > lastMA20;
      if (priceAboveMA20 && ma5AboveMA20) {
        score += 2;
        signals.push('✓ 均线多排(价>MA20, MA5>MA20)');
      } else if (priceAboveMA20) {
        score += 1;
        signals.push('◐ 价格站上MA20');
      } else {
        signals.push('✗ 价格未站上MA20');
      }
    }

    // 2. RSI(6) > 50
    const rsi6 = calcRSI(closes, 6);
    const lastRSI = rsi6.filter(v => v !== null).pop();
    if (lastRSI !== null && lastRSI !== undefined) {
      if (lastRSI > 50 && lastRSI < 80) {
        score += 1;
        signals.push(`✓ RSI6=${lastRSI.toFixed(1)} (强势区)`);
      } else if (lastRSI >= 80) {
        signals.push(`⚠ RSI6=${lastRSI.toFixed(1)} (超买)`);
      } else {
        signals.push(`✗ RSI6=${lastRSI.toFixed(1)} (弱势)`);
      }
    }

    // 3. MACD golden cross (DIF > DEA)
    const { dif, dea } = calcMACD(closes);
    const lastDIF = dif[dif.length - 1];
    const lastDEA = dea[dea.length - 1];
    const prevDIF = dif[dif.length - 2];
    const prevDEA = dea[dea.length - 2];
    if (lastDIF > lastDEA) {
      if (prevDIF <= prevDEA) {
        score += 2;
        signals.push('✓ MACD刚金叉');
      } else {
        score += 1;
        signals.push('✓ MACD多头(DIF>DEA)');
      }
    } else {
      signals.push('✗ MACD空头');
    }

    // 4. Volume surge: recent 3 bars avg > prev 20 bars avg * 1.5
    if (volumes.length >= 23) {
      const recentVol = (volumes.slice(-3).reduce((a, b) => a + b, 0)) / 3;
      const prevVol = (volumes.slice(-23, -3).reduce((a, b) => a + b, 0)) / 20;
      if (prevVol > 0 && recentVol > prevVol * 1.5) {
        score += 1;
        signals.push(`✓ 放量(${(recentVol / prevVol).toFixed(1)}x)`);
      } else {
        signals.push(`✗ 未放量(${(recentVol / prevVol).toFixed(1)}x)`);
      }
    }

    // Score >= 3 is considered right-side
    const isRightSide = score >= 3;
    const detail = `[${score}/5] ${signals.join(' | ')}`;

    const result = { ts: Date.now(), isRightSide, score, signals, detail };
    rightSideCache[sym] = result;
    return result;
  } catch (e) {
    return { ts: Date.now(), isRightSide: false, score: 0, signals: [], detail: '请求失败' };
  }
}

async function pMap(items, fn, concurrency = 5) {
  const results = [];
  let idx = 0;
  async function worker() {
    while (idx < items.length) {
      const i = idx++;
      results[i] = await fn(items[i], i);
    }
  }
  await Promise.all(Array.from({ length: Math.min(concurrency, items.length) }, () => worker()));
  return results;
}

async function checkCoinLeftSide(sym) {
  const cached = leftSideCache[sym];
  if (cached && Date.now() - cached.ts < 5 * 60 * 1000) return cached;
  try {
    const res = await fetch(`/api/klines?symbol=${sym}&interval=${filterTF}&limit=100`);
    const raw = await res.json();
    if (raw.error || !Array.isArray(raw) || raw.length < 30) {
      return { ts: Date.now(), isLeftSide: false, score: 0, signals: [], detail: '数据不足' };
    }
    const closes = raw.map(k => parseFloat(k[4]));
    const volumes = raw.map(k => parseFloat(k[5]));
    const lastPrice = closes[closes.length - 1];
    const signals = [];
    let score = 0;

    // 1. RSI(6) < 30 (oversold)
    const rsi6 = calcRSI(closes, 6);
    const lastRSI = rsi6.filter(v => v !== null).pop();
    if (lastRSI !== null && lastRSI !== undefined) {
      if (lastRSI < 30) {
        score += 2;
        signals.push(`✓ RSI6=${lastRSI.toFixed(1)} (超卖)`);
      } else if (lastRSI < 40) {
        score += 1;
        signals.push(`◐ RSI6=${lastRSI.toFixed(1)} (偏弱)`);
      } else {
        signals.push(`✗ RSI6=${lastRSI.toFixed(1)} (非超卖)`);
      }
    }

    // 2. Price far below MA20
    const ma20 = calcMA(closes, 20);
    const lastMA20 = ma20[ma20.length - 1];
    if (lastMA20 !== null) {
      const deviation = (lastPrice - lastMA20) / lastMA20;
      if (deviation < -0.1) {
        score += 2;
        signals.push(`✓ 偏离MA20 ${(deviation * 100).toFixed(1)}% (深度超跌)`);
      } else if (deviation < -0.05) {
        score += 1;
        signals.push(`◐ 偏离MA20 ${(deviation * 100).toFixed(1)}%`);
      } else {
        signals.push(`✗ 偏离MA20 ${(deviation * 100).toFixed(1)}% (未超跌)`);
      }
    }

    // 3. MACD converging (DIF < DEA but gap narrowing)
    const { dif, dea } = calcMACD(closes);
    const lastDIF = dif[dif.length - 1];
    const lastDEA = dea[dea.length - 1];
    const prevDIF = dif[dif.length - 2];
    const prevDEA = dea[dea.length - 2];
    if (lastDIF < lastDEA) {
      const lastGap = Math.abs(lastDIF - lastDEA);
      const prevGap = Math.abs(prevDIF - prevDEA);
      if (lastGap < prevGap) {
        score += 1;
        signals.push('✓ MACD空头收敛(即将金叉)');
      } else {
        signals.push('✗ MACD空头发散');
      }
    } else {
      signals.push('✗ MACD已多头(非左侧)');
    }

    // 4. Volume shrinking (recent volume < avg, capitulation over)
    if (volumes.length >= 23) {
      const recentVol = (volumes.slice(-3).reduce((a, b) => a + b, 0)) / 3;
      const prevVol = (volumes.slice(-23, -3).reduce((a, b) => a + b, 0)) / 20;
      if (prevVol > 0 && recentVol < prevVol * 0.6) {
        score += 1;
        signals.push(`✓ 缩量(${(recentVol / prevVol).toFixed(1)}x 地量)`);
      } else {
        signals.push(`✗ 未缩量(${(recentVol / prevVol).toFixed(1)}x)`);
      }
    }

    const isLeftSide = score >= 3;
    const detail = `[${score}/6] ${signals.join(' | ')}`;
    const result = { ts: Date.now(), isLeftSide, score, signals, detail };
    leftSideCache[sym] = result;
    return result;
  } catch (e) {
    return { ts: Date.now(), isLeftSide: false, score: 0, signals: [], detail: '请求失败' };
  }
}

async function scanRightSideCoins() {
  rightSideLoading = true;
  scanProgress = { done: 0, total: 0 };
  rightSideCoins.clear();
  rightSideResults = [];
  renderFilterTabs();
  renderCoinTabs();

  let symbols;
  try {
    const res = await fetch(`/api/top-symbols?limit=${scanTopLimit}`);
    symbols = await res.json();
    if (!Array.isArray(symbols)) throw new Error('bad response');
  } catch (e) {
    rightSideLoading = false;
    renderFilterTabs();
    return;
  }

  scanProgress.total = symbols.length;
  renderFilterTabs();

  await pMap(symbols, async (item) => {
    const r = await checkCoinRightSide(item.symbol);
    scanProgress.done++;
    if (r.isRightSide) {
      rightSideCoins.add(item.symbol);
      rightSideResults.push({ symbol: item.symbol, label: item.symbol.replace('USDT', ''), ...r, volume: item.volume, change: item.change });
      sortRightSideResults();
      renderCoinTabs();
    }
    if (scanProgress.done % 10 === 0) renderFilterTabs();
  }, 5);

  rightSideLoading = false;
  renderFilterTabs();
  renderCoinTabs();
}

function setupOverlay() {
  const hoverArea = document.getElementById('klineHoverArea');
  const overlay = document.getElementById('c-kline-overlay');
  const klineCanvas = document.getElementById('c-kline');

  const dpr = window.devicePixelRatio || 1;
  const rect = klineCanvas.getBoundingClientRect();
  overlay.width = rect.width * dpr;
  overlay.height = rect.height * dpr;
  overlay.style.width = rect.width + 'px';
  overlay.style.height = rect.height + 'px';

  hoverArea.onmousemove = (e) => {
    if (!lastKlines || !lastKlines.length) return;
    const br = klineCanvas.getBoundingClientRect();
    const mx = e.clientX - br.left;
    const my = e.clientY - br.top;
    const W = br.width, H = br.height;
    const pad = { top: 12, right: 60, bottom: 28, left: 10 };
    const cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;
    const gap = cw / lastKlines.length;

    if (mx < pad.left || mx > W - pad.right || my < pad.top || my > pad.top + ch) {
      clearOverlay(); return;
    }

    const idx = Math.min(lastKlines.length - 1, Math.max(0, Math.floor((mx - pad.left) / gap)));
    const k = lastKlines[idx];
    const cx = pad.left + gap * idx + gap / 2;

    const highs = lastKlines.map(k => k.high);
    const lows = lastKlines.map(k => k.low);
    let pMin = Math.min(...lows), pMax = Math.max(...highs);
    const pRange = pMax - pMin || 1;
    pMin -= pRange * 0.02; pMax += pRange * 0.02;
    const price = pMin + (1 - (my - pad.top) / ch) * (pMax - pMin);

    const ctx = overlay.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);

    // vertical line
    ctx.strokeStyle = '#8b949e80'; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(cx, pad.top); ctx.lineTo(cx, pad.top + ch); ctx.stroke();
    // horizontal line
    ctx.beginPath(); ctx.moveTo(pad.left, my); ctx.lineTo(W - pad.right, my); ctx.stroke();
    ctx.setLineDash([]);

    // price label on right
    const dec = price < 1 ? 6 : price < 100 ? 4 : 2;
    ctx.fillStyle = '#30363d';
    ctx.fillRect(W - pad.right, my - 9, 56, 18);
    ctx.strokeStyle = '#8b949e'; ctx.lineWidth = 0.5;
    ctx.strokeRect(W - pad.right, my - 9, 56, 18);
    ctx.fillStyle = '#e6edf3'; ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(price.toFixed(dec), W - pad.right + 4, my + 3);

    // highlight candle high/low with small ticks
    const highY = pad.top + ch * (1 - (k.high - pMin) / (pMax - pMin));
    const lowY = pad.top + ch * (1 - (k.low - pMin) / (pMax - pMin));
    const closeY = pad.top + ch * (1 - (k.close - pMin) / (pMax - pMin));
    ctx.fillStyle = '#3fb95090';
    ctx.font = '9px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(k.high.toFixed(dec), cx - 6, highY - 3);
    ctx.fillStyle = '#f8514990';
    ctx.fillText(k.low.toFixed(dec), cx - 6, lowY + 10);

    // time label on bottom
    const timeLabel = ts2klineLabel(k.openTime, currentTF);
    const tw = ctx.measureText(timeLabel).width + 12;
    ctx.fillStyle = '#30363d';
    ctx.fillRect(cx - tw / 2, pad.top + ch + 2, tw, 16);
    ctx.strokeRect(cx - tw / 2, pad.top + ch + 2, tw, 16);
    ctx.fillStyle = '#e6edf3'; ctx.textAlign = 'center';
    ctx.fillText(timeLabel, cx, pad.top + ch + 14);

    // OHLCV + amplitude + change info at top
    const isUp = k.close >= k.open;
    const ohlcEl = document.getElementById('klineOHLC');
    const d = dec;
    const amplitude = ((k.high - k.low) / k.open * 100).toFixed(2);
    let changeStr = '', changeColor = 'var(--text2)';
    if (idx > 0) {
      const prevClose = lastKlines[idx - 1].close;
      const change = ((k.close - prevClose) / prevClose * 100);
      changeColor = change >= 0 ? 'var(--green)' : 'var(--red)';
      changeStr = `<span>涨跌: <b style="color:${changeColor}">${change >= 0 ? '+' : ''}${change.toFixed(2)}%</b></span>`;
    }
    ohlcEl.innerHTML =
      `<span style="color:var(--text2)">${ts2klineLabel(k.openTime, currentTF)}</span>` +
      `<span>开: <b style="color:${isUp ? 'var(--green)' : 'var(--red)'}">${k.open.toFixed(d)}</b></span>` +
      `<span>高: <b style="color:var(--green)">${k.high.toFixed(d)}</b></span>` +
      `<span>低: <b style="color:var(--red)">${k.low.toFixed(d)}</b></span>` +
      `<span>收: <b style="color:${isUp ? 'var(--green)' : 'var(--red)'}">${k.close.toFixed(d)}</b></span>` +
      `<span>振幅: <b>${amplitude}%</b></span>` +
      changeStr +
      `<span>量: <b>${formatNum(k.volume)}</b></span>`;
  };

  hoverArea.onmouseleave = clearOverlay;
}

  document.getElementById('klineOHLC').innerHTML = '';
}

if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}
renderAlerts();
document.getElementById('symbolInput').value = symbol;
const intSelect = document.getElementById('intervalSelect');
if ([...intSelect.options].some(o => o.value === String(interval))) {
  intSelect.value = String(interval);
}

window.addEventListener('resize', () => { fetchData(); });
renderFilterTabs();
renderCoinTabs();
renderTFTabs();
renderChartRangeBar();
fetchData();
startCountdown();
setTimeout(scanRightSideCoins, 2000);
</script>
</body>
